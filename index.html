<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>抽獎系統</title>

<style>

body{
margin:0;
font-family:sans-serif;
background:#000;
color:white;
overflow:hidden;
}

/* 左上角統計 /

.hud{
position:fixed;
top:20px;
left:20px;
font-size:18px;
line-height:28px;
}

/ 右上角 /

.topbar{
position:fixed;
top:20px;
right:20px;
font-size:24px;
display:flex;
gap:15px;
}

.topbar span{
cursor:pointer;
}

/ 主畫面 /

.center{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
}

.start-btn{
font-size:40px;
padding:20px 60px;
cursor:pointer;
}

/ READY /

.ready{
display:none;
text-align:center;
}

.ready h1{
font-size:80px;
margin:0;
}

.ready p{
font-size:30px;
}

.draw-btn{
font-size:30px;
padding:15px 40px;
cursor:pointer;
}

/ 滾動視窗 /

.rollModal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
display:none;
align-items:center;
justify-content:center;
flex-direction:column;
}

.rollName{
font-size:100px;
}

/ 得獎視窗 /

.winnerModal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.95);
display:none;
align-items:center;
justify-content:center;
flex-direction:column;
text-align:center;
}

.winnerTitle{
font-size:40px;
margin-bottom:30px;
}

.winnerList{
display:grid;
gap:20px;
}

/ 設定 */

.settings{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:none;
padding:40px;
}

textarea,input{
width:100%;
margin:10px 0;
padding:10px;
}

button{
padding:10px 20px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="hud">
<div>👥 參與人數：<span id="total">0</span></div>
<div>🎯 已抽人數：<span id="drawn">0</span></div>
<div>📉 剩餘人數：<span id="remain">0</span></div>
</div>

<div class="topbar">
<span onclick="toggleMusic()">🔊</span>
<span onclick="openSettings()">⚙</span>
</div>

<div class="center" id="startScreen">
<button class="start-btn" onclick="enterReady()">開始抽獎</button>
</div>

<div class="center ready" id="readyScreen">
<h1>READY</h1>
<p>準備開獎</p>
<button class="draw-btn" onclick="startRoll()">開始抽獎</button>
</div>

<div class="rollModal" id="rollModal">
<div class="rollName" id="rollName">王小明</div>
</div>

<div class="winnerModal" id="winnerModal">
<div class="winnerTitle">🎉 天選之人 🎉</div>
<div class="winnerList" id="winnerList"></div>
</div>

<div class="settings" id="settings">

<h2>系統設定</h2>

<p>參與名單 (一行一人)</p>
<textarea id="names" rows="10"></textarea>

<p>一次抽幾人</p>
<input type="number" id="drawCount" value="1">

<p>得獎名字字體大小</p>
<input type="number" id="fontSize" value="100">

<button onclick="saveSettings()">儲存</button>

</div>

<script>

let names=[]
let drawn=0
let drawCount=1
let fontSize=100
let timer

function enterReady(){

document.getElementById("startScreen").style.display="none"
document.getElementById("readyScreen").style.display="block"

}

function startRoll(){

if(names.length===0){
alert("請先設定名單")
return
}

document.getElementById("rollModal").style.display="flex"

timer=setInterval(()=>{

let n=names[Math.floor(Math.random()*names.length)]
document.getElementById("rollName").innerText=n

},80)

setTimeout(()=>{

clearInterval(timer)
showWinner()

},4000)

}

function showWinner(){

document.getElementById("rollModal").style.display="none"

let winners=[]

for(let i=0;i<drawCount;i++){

if(names.length===0)break

let index=Math.floor(Math.random()*names.length)

winners.push(names.splice(index,1)[0])

drawn++

}

updateHUD()

let area=document.getElementById("winnerList")

area.innerHTML=""

area.style.fontSize=fontSize+"px"

winners.forEach(n=>{

let div=document.createElement("div")

div.innerText=n

area.appendChild(div)

})

document.getElementById("winnerModal").style.display="flex"

}

function updateHUD(){

document.getElementById("total").innerText=names.length+drawn
document.getElementById("drawn").innerText=drawn
document.getElementById("remain").innerText=names.length

}

function openSettings(){

document.getElementById("settings").style.display="block"

}

function saveSettings(){

names=document.getElementById("names").value.split("\n").filter(n=>n)

drawCount=parseInt(document.getElementById("drawCount").value)

fontSize=parseInt(document.getElementById("fontSize").value)

drawn=0

updateHUD()

document.getElementById("settings").style.display="none"

}

function toggleMusic(){
alert("音樂功能可自行加入")
}

</script>

</body>
</html>

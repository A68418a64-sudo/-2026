<!DOCTYPE html>
<html lang="zh-TW">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>亞護開發 春酒抽獎系統</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>

body,html{
margin:0;
padding:0;
width:100%;
height:100%;
overflow:hidden;
background:black;
font-family:sans-serif;
}

.main-stage{

position:relative;
width:100vw;
height:100vh;

background:url("yahu.jpg.PNG") center/cover no-repeat;

transition:0.5s;

}

.ready-mode{
background-image:url("ready.jpg.PNG") !important;
}

/* 按鈕 */

#start-trigger{
position:absolute;
width:32%;
height:12%;
top:59%;
left:50%;
transform:translate(-50%,-50%);
cursor:pointer;
z-index:10;
}

#draw-trigger{
position:absolute;
width:22%;
height:8%;
top:76%;
left:50%;
transform:translate(-50%,-50%);
cursor:pointer;
z-index:10;
display:none;
}

#admin-trigger{
position:absolute;
width:20%;
height:5%;
bottom:3%;
left:50%;
transform:translateX(-50%);
cursor:pointer;
z-index:10;
display:none;
}

/* 音樂按鈕 */

#music-btn{

position:fixed;

top:20px;
right:20px;

width:50px;
height:50px;

border-radius:50%;

background:rgba(0,0,0,0.7);

display:flex;
align-items:center;
justify-content:center;

color:white;
font-size:24px;

cursor:pointer;

z-index:999;

}

/* 滾動抽獎 */

#rolling-ui{

position:absolute;
top:0;
left:0;
width:100%;
height:100%;

background:rgba(0,0,0,0.9);

display:none;

flex-direction:column;
align-items:center;
justify-content:center;

z-index:20;

}

.rolling-name{

font-size:90px;
color:white;
font-weight:bold;

text-shadow:0 0 40px #fccd4d;

}

/* 中獎 */

#winner-ui{

position:absolute;
top:0;
left:0;
width:100%;
height:100%;

background:rgba(0,0,0,0.9);

display:none;

flex-direction:column;
align-items:center;
justify-content:center;

z-index:30;

}

.winner-name{

font-size:100px;
color:white;
font-weight:bold;

text-shadow:0 0 50px gold;

text-align:center;

}

</style>
</head>

<body>

<div id="music-btn">🔊</div>

<div class="main-stage" id="stage">

<div id="start-trigger" onclick="goToReady()"></div>

<div id="draw-trigger" onclick="runLottery()"></div>

<div id="admin-trigger"></div>

<div id="rolling-ui">

<div style="color:#fccd4d;font-size:32px;margin-bottom:40px;">
抽獎進行中
</div>

<div id="rolling-name" class="rolling-name"></div>

</div>

<div id="winner-ui" onclick="reset()">

<div style="color:#fccd4d;font-size:40px;margin-bottom:20px;">
天選之人
</div>

<div id="winner-name" class="winner-name"></div>

</div>

</div>

<audio id="bgm" loop>

<source src="music.mp3.m4a">

</audio>

<script>

let rolling=false
let timer

let musicOn=true

const audio=document.getElementById("bgm")

const musicBtn=document.getElementById("music-btn")

/* 音樂控制 */

musicBtn.onclick=function(){

if(musicOn){

audio.pause()
musicBtn.innerHTML="🔇"

}else{

audio.play()

musicBtn.innerHTML="🔊"

}

musicOn=!musicOn

}

/* 第一次點擊解鎖音訊 */

document.body.addEventListener("click",function(){

if(audio.paused && musicOn){

audio.play().catch(()=>{})

}

},{once:true})

/* 進入抽獎畫面 */

function goToReady(){

document.getElementById("start-trigger").style.display="none"

document.getElementById("stage").classList.add("ready-mode")

document.getElementById("draw-trigger").style.display="block"

if(musicOn){

audio.play().catch(()=>{})

}

}

/* 抽獎 */

let names=[]

function runLottery(){

if(rolling) return

if(names.length==0){

let text=prompt("輸入名單 (用逗號分隔)")

if(!text) return

names=text.split(",")

}

rolling=true

document.getElementById("rolling-ui").style.display="flex"

timer=setInterval(()=>{

let name=names[Math.floor(Math.random()*names.length)]

document.getElementById("rolling-name").innerText=name

},60)

setTimeout(()=>{

clearInterval(timer)

rolling=false

showWinner()

},7000)

}

/* 中獎 */

function showWinner(){

document.getElementById("rolling-ui").style.display="none"

let index=Math.floor(Math.random()*names.length)

let winner=names.splice(index,1)

document.getElementById("winner-name").innerText=winner

document.getElementById("winner-ui").style.display="flex"

confetti({
particleCount:250,
spread:100,
origin:{y:0.6}
})

}

/* 重置 */

function reset(){

document.getElementById("winner-ui").style.display="none"

}

</script>

</body>
</html>

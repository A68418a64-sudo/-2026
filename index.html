<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>亞護開發 2026 春酒抽獎</title>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background: black;
            font-family: "Microsoft JhengHei", sans-serif;
        }

        /* 關鍵修正：對應截圖中的 ready.jpg.JPG */
        .main-stage {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: url('ready.jpg.JPG') center/cover no-repeat;
            transition: 0.5s;
        }

        /* 人數顯示定位：直接顯示在標題下方的橫條區 */
        #dynamic-stats {
            position: absolute;
            top: 50.3%; 
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            justify-content: center;
            gap: 60px; 
            z-index: 5;
            width: 100%;
            pointer-events: none;
        }

        .stat-item {
            color: #fccd4d; /* 金色文字 */
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 2px;
            text-shadow: 2px 2px 4px rgba(0,0,0,1);
            display: flex;
            align-items: center;
        }

        /* 齒輪與按鈕微調 */
        #settings-btn {
            position: absolute;
            top: 20px; left: 20px;
            width: 45px; height: 45px;
            color: rgba(255,255,255,0.3);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            z-index: 60;
            font-size: 24px;
        }

        #music-btn {
            position: absolute;
            top: 20px; right: 20px;
            color: rgba(255,255,255,0.3);
            cursor: pointer;
            z-index: 50;
            font-size: 24px;
        }

        /* 點擊「開始抽獎」的透明範圍 */
        #draw-trigger {
            position: absolute;
            width: 25%; height: 8%;
            top: 86.5%; left: 50%;
            transform: translate(-50%, -50%);
            cursor: pointer;
            z-index: 10;
        }

        /* 抽獎與得獎層 */
        #rolling-ui, #winner-ui {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #rolling-ui { background: rgba(0, 0, 0, 0.88); z-index: 20; }
        #winner-ui { background: rgba(0, 0, 0, 0.92); z-index: 25; cursor: pointer; }

        .rolling-name { font-size: 100px; color: white; font-weight: bold; text-shadow: 0 0 40px #fccd4d; }
        .winner-name { font-size: 110px; color: white; font-weight: bold; text-shadow: 0 0 50px #fccd4d; text-align: center; white-space: pre-wrap; line-height: 1.2; }

        /* 設定面板 */
        #admin-panel {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(10, 10, 10, 0.98);
            display: none;
            z-index: 100;
            padding: 40px 20px;
            box-sizing: border-box;
            color: white;
            overflow-y: auto;
        }

        .admin-content { max-width: 500px; margin: 0 auto; }
        .admin-input { width: 100%; background: #222; border: 1px solid #555; color: white; padding: 12px; margin: 10px 0 20px 0; font-size: 18px; border-radius: 8px; box-sizing: border-box; }
        .save-btn { background: #fccd4d; border: none; color: black; padding: 18px; font-weight: bold; border-radius: 8px; cursor: pointer; width: 100%; font-size: 20px; }
    </style>
</head>

<body>

    <div class="main-stage" id="stage">
        <div id="dynamic-stats">
            <div class="stat-item"><i class="fas fa-users" style="margin-right:10px; font-size:18px;"></i> 剩餘 <span id="count-remain">0</span> 人</div>
            <div class="stat-item">已抽 <span id="count-pulled">0</span> 人</div>
        </div>

        <div id="settings-btn" onclick="showAdmin()"><i class="fas fa-cog"></i></div>
        <div id="music-btn" onclick="toggleMusic()">🔇</div>

        <div id="draw-trigger" onclick="runLottery()"></div>

        <div id="rolling-ui">
            <div style="color:#fccd4d; font-size:32px; margin-bottom:40px; letter-spacing:10px;">抽獎進行中</div>
            <div id="rolling-name" class="rolling-name"></div>
        </div>

        <div id="winner-ui" onclick="reset()">
            <div style="color:#fccd4d; font-size:30px; margin-bottom:20px; letter-spacing:12px;">天選之人</div>
            <div id="winner-name" class="winner-name"></div>
            <div style="color:#aaa; margin-top:50px;">點擊畫面繼續</div>
        </div>
    </div>

    <div id="admin-panel">
        <div class="admin-content">
            <h2 style="color:#fccd4d; text-align: center;">系統設定面板</h2>
            <label>名單 (一人一行)</label>
            <textarea id="admin-names" class="admin-input" rows="10" placeholder="請在此

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>亞護開發 2026 春酒抽獎</title>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background: black;
            font-family: "Microsoft JhengHei", sans-serif;
        }

        .main-stage {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: url('yahu.jpg.PNG') center/cover no-repeat;
            transition: 0.5s;
        }

        .ready-mode {
            background-image: url('ready.jpg.PNG') !important;
        }

        /* 統計資訊顯示 (左下方) */
        #stat-info {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: white;
            background: rgba(0,0,0,0.5);
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 18px;
            z-index: 40;
            line-height: 1.6;
            pointer-events: none; /* 防止擋到點擊 */
        }

        .stat-num {
            color: #fccd4d;
            font-weight: bold;
            font-size: 22px;
            margin: 0 5px;
        }

        /* 按鈕區域 */
        #start-trigger {
            position: absolute;
            width: 32%; height: 12%;
            top: 59%; left: 50%;
            transform: translate(-50%, -50%);
            cursor: pointer;
            z-index: 10;
        }

        #draw-trigger {
            position: absolute;
            width: 25%; height: 10%;
            top: 76%; left: 50%;
            transform: translate(-50%, -50%);
            cursor: pointer;
            z-index: 10;
            display: none;
        }

        #settings-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 44px; height: 44px;
            background: rgba(0, 0, 0, 0.4);
            color: white;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            z-index: 60;
            font-size: 24px;
            border: 1px solid rgba(255,255,255,0.2);
        }

        #music-btn {
            position: absolute;
            top: 20px; right: 20px;
            background: rgba(0, 0, 0, 0.4);
            color: white;
            padding: 10px 15px;
            border-radius: 10px;
            cursor: pointer;
            z-index: 50;
            font-size: 18px;
            border: 1px solid rgba(255,255,255,0.2);
        }

        /* 抽獎與得獎 UI */
        #rolling-ui, #winner-ui {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #rolling-ui { background: rgba(0, 0, 0, 0.85); z-index: 20; }
        #winner-ui { background: rgba(0, 0, 0, 0.9); z-index: 25; cursor: pointer; }

        .rolling-name { font-size: 90px; color: white; font-weight: bold; text-shadow: 0 0 40px #fccd4d; }
        .winner-name { font-size: 100px; color: white; font-weight: bold; text-shadow: 0 0 50px #fccd4d; text-align: center; white-space: pre-wrap; }

        /* 設定面板 */
        #admin-panel {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(15, 10, 5, 0.98);
            display: none;
            z-index: 100;
            padding: 40px 20px;
            box-sizing: border-box;
            color: white;
            overflow-y: auto;
        }

        .admin-content { max-width: 600px; margin: 0 auto; }
        .admin-input { width: 100%; background: #222; border: 1px solid #444; color: white; padding: 12px; margin: 10px 0 20px 0; font-size: 16px; border-radius: 8px; box-sizing: border-box; }
        .save-btn { background: #fccd4d; border: none; color: black; padding: 18px; font-weight: bold; border-radius: 8px; cursor: pointer; width: 100%; font-size: 18px; }
    </style>
</head>

<body>

    <div class="main-stage" id="stage">
        <div id="stat-info">
            剩餘人數：<span id="count-remain" class="stat-num">0</span><br>
            已抽人數：<span id="count-pulled" class="stat-num">0</span>
        </div>

        <div id="settings-btn" onclick="showAdmin()"><i class="fas fa-cog"></i></div>
        <div id="music-btn" onclick="toggleMusic()">🔊</div>

        <div id="start-trigger" onclick="goToReady()"></div>
        <div id="draw-trigger" onclick="runLottery()"></div>

        <div id="rolling-ui">
            <div style="color:#fccd4d; font-size:32px; margin-bottom:40px; letter-spacing:8px;">抽獎進行中</div>
            <div id="rolling-name" class="rolling-name">準備中...</div>
        </div>

        <div id="winner-ui" onclick="reset()">
            <div style="color:#fccd4d; font-size:30px; margin-bottom:20px; letter-spacing:10px;">恭喜獲獎</div>
            <div id="winner-name" class="winner-name"></div>
            <div style="color:#aaa; margin-top:40px;">點擊畫面繼續</div>
        </div>
    </div>

    <div id="admin-panel">
        <div class="admin-content">
            <h2 style="color:#fccd4d; text-align: center;">抽獎系統設定</h2>
            
            <label>抽獎名單 (一人一行)</label>
            <textarea id="admin-names" class="admin-input" rows="8" placeholder="請輸入姓名..."></textarea>

            <label>單次抽出人數</label>
            <input type="number" id="admin-per" class="admin-input" value="1" min="1">

            <label>得獎字體大小</label>
            <input type="text" id="admin-size" class="admin-input" value="80px">

            <button class="save-btn" onclick="hideAdmin()">儲存並重設進度</button>
            <p style="font-size: 13px; color: #888; margin-top: 10px; text-align: center;">* 儲存會根據新名單重置「已抽人數」</p>
        </div>
    </div>

    <audio id="bgm" src="music.mp3.m4a" loop></audio>

    <script>
        let rolling = false;
        let timer;
        let musicOn = true;
        let pulledCount = 0; // 追蹤已抽人數

        let config = {
            names: [],
            perDraw: 1,
            fontSize: "80px"
        };

        const audio = document.getElementById("bgm");

        // 更新畫面上的統計數字
        function updateStatUI() {
            document.getElementById("count-remain").innerText = config.names.length;
            document.getElementById("count-pulled").innerText = pulledCount;
        }

        function toggleMusic() {
            if (musicOn) {
                audio.pause();
                document.getElementById("music-btn").innerText = "🔇";
            } else {
                audio.play();
                document.getElementById("music-btn").innerText = "🔊";
            }
            musicOn = !musicOn;
        }

        function showAdmin() {
            document.getElementById("admin-panel").style.display = "block";
        }

        function hideAdmin() {
            config.names = document.getElementById("admin-names").value
                .split("\n")
                .map(n => n.trim())
                .filter(n => n !== "");

            config.perDraw = parseInt(document.getElementById("admin-per").value) || 1;
            config.fontSize = document.getElementById("admin-size").value;
            
            // 重新輸入名單時，將已抽人數歸零
            pulledCount = 0; 
            updateStatUI();

            document.getElementById("admin-panel").style.display = "none";
        }

        function goToReady() {
            document.getElementById("start-trigger").style.display = "none";
            document.getElementById("stage").classList.add("ready-mode");
            document.getElementById("draw-trigger").style.display = "block";
            updateStatUI(); // 進入準備畫面時更新一次
            if (musicOn) { audio.currentTime = 0; audio.play(); }
        }

        function runLottery() {
            if (rolling) return;
            if (config.names.length === 0) {
                alert("名單已空或未輸入！");
                showAdmin();
                return;
            }

            rolling = true;
            document.getElementById("rolling-ui").style.display = "flex";

            timer = setInterval(() => {
                let name = config.names[Math.floor(Math.random() * config.names.length)];
                document.getElementById("rolling-name").innerText = name;
            }, 60);

            setTimeout(() => {
                clearInterval(timer);
                rolling = false;
                showWinner();
            }, 7000);
        }

        function showWinner() {
            document.getElementById("rolling-ui").style.display = "none";
            let winners = [];

            for (let i = 0; i < config.perDraw; i++) {
                if (config.names.length > 0) {
                    let index = Math.floor(Math.random() * config.names.length);
                    winners.push(config.names.splice(index, 1)[0]);
                    pulledCount++; // 每抽中一個，計數加 1
                }
            }

            let winText = document.getElementById("winner-name");
            winText.innerText = winners.join("\n");
            winText.style.fontSize = config.fontSize;

            document.getElementById("winner-ui").style.display = "flex";
            
            updateStatUI(); // 開獎後立即更新剩餘人數

            confetti({
                particleCount: 250,
                spread: 100,
                origin: { y: 0.6 }
            });
        }

        function reset() {
            document.getElementById("winner-ui").style.display = "none";
            document.getElementById("rolling-name").innerText = "準備中...";
        }

        // 初始化
        updateStatUI();
    </script>

</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>亞護開發 2026</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: sans-serif; }
        .main-stage {
            position: relative; width: 100vw; height: 100vh;
            background: url('yahu.jpg.PNG') center/contain no-repeat;
            background-color: #000;
        }
        .ready-mode { background-image: url('ready.jpg.PNG') !important; }

        /* 封面：遊戲開始按鈕區 */
        #start-trigger {
            position: absolute; width: 45%; height: 18%; top: 59%; left: 50%;
            transform: translate(-50%, -50%); cursor: pointer; z-index: 99;
        }

        /* 抽獎頁：開始抽獎按鈕區 */
        #draw-trigger {
            position: absolute; width: 35%; height: 12%; top: 76%; left: 50%;
            transform: translate(-50%, -50%); cursor: pointer; z-index: 99; display: none;
        }

        /* 關鍵修正：系統設定點擊區 (向上偏移 8% 以避開 iPad 底部手勢區) */
        #admin-trigger {
            position: absolute; width: 60%; height: 12%; bottom: 8%; left: 50%;
            transform: translateX(-50%); cursor: pointer; z-index: 100; display: none;
            /* background: rgba(255,0,0,0.2); // 如果還點不到，取消此行註解可顯示紅框位置 */
        }

        #roll-text {
            position: absolute; top: 56%; left: 50%; transform: translate(-50%, -50%);
            font-size: 80px; font-weight: bold; color: #fff; text-shadow: 0 0 30px #fccd4d;
            z-index: 5; display: none; width: 100%; text-align: center; pointer-events: none;
        }

        #winner-ui {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 200; display: none; flex-direction: column; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.92);
        }
        .winner-name { font-size: 110px; color: #fff; text-shadow: 0 0 50px #fccd4d; font-weight: bold; text-align: center; line-height: 1.2; }

        /* 設定面板 */
        #admin-panel {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 999; display: none; color: white; padding: 40px; box-sizing: border-box;
        }
        .admin-input { width: 100%; background: #222; color: #fff; border: 1px solid #444; padding: 15px; margin: 10px 0; font-size: 20px; border-radius: 10px; }
        .save-btn { background: #fccd4d; color: #000; padding: 20px 60px; border: none; font-weight: bold; font-size: 22px; border-radius: 12px; cursor: pointer; margin-top: 30px; }
    </style>
</head>
<body>
    <div class="main-stage" id="stage">
        <div id="start-trigger" onclick="goToReady()"></div>
        <div id="roll-text"></div>
        <div id="draw-trigger" onclick="toggleDraw()"></div>
        <div id="admin-trigger" onclick="showAdmin()"></div>

        <div id="winner-ui" onclick="reset()">
            <div style="color:#fccd4d; font-size:35px; letter-spacing:10px; margin-bottom:25px;">恭喜獲得</div>
            <div id="winner-name" class="winner-name"></div>
            <div style="color:#888; margin-top:50px; font-size:22px;">點擊螢幕繼續</div>
        </div>
    </div>

    <div id="admin-panel">
        <h2 style="color:#fccd4d; margin-top:0;">亞護開發：抽獎系統設定</h2>
        <p>1. 輸入抽獎名單 (一人一行)：</p>
        <textarea id="admin-names" class="admin-input" rows="8" placeholder="請在此貼上 60 人名單..."></textarea>
        <div style="display:flex; gap:20px;">
            <div style="flex:1;">總抽獎次數：<input type="number" id="admin-total" class="admin-input" value="10"></div>
            <div style="flex:1;">每次抽出人數：<input type="number" id="admin-per" class="admin-input" value="1"></div>
        </div>
        <center><button class="save-btn" onclick="hideAdmin()">儲存並開啟 App</button></center>
    </div>

    <audio id="mulan-audio" src="music.mp3.m4a"></audio>

    <script>
        let rolling = false; let timer; 
        let config = { names: [], totalDraws: 10, perDraw: 1 };
        const audio = document.getElementById('mulan-audio');

        function showAdmin() { document.getElementById('admin-panel').style.display = 'block'; }
        
        function hideAdmin() {
            const rawNames = document.getElementById('admin-names').value.split('\n').filter(n => n.trim() !== "");
            config.names = rawNames;
            config.totalDraws = parseInt(document.getElementById('admin-total').value);
            config.perDraw = parseInt(document.getElementById('admin-per').value);
            document.getElementById('admin-panel').style.display = 'none';
            alert("✅ 亞護開發名單載入成功！共計：" + config.names.length + " 人");
        }

        function goToReady() {
            document.getElementById('start-trigger').style.display = 'none';
            document.getElementById('stage').classList.add('ready-mode');
            document.getElementById('draw-trigger').style.display = 'block';
            document.getElementById('admin-trigger').style.display = 'block';
            document.getElementById('roll-text').style.display = 'block';
            audio.play(); // 音樂只播放一次
        }

        function toggleDraw() {
            if (config.names.length === 0 && !rolling) { alert("⚠️ 請先點擊下方的『系統設定』輸入同仁名單！"); return; }
            if (config.totalDraws <= 0 && !rolling) { alert("抽獎次數已用完！"); return; }
            
            if (!rolling) {
                rolling = true; 
                timer = setInterval(() => {
                    document.getElementById('roll-text').innerText = config.names[Math.floor(Math.random() * config.names.length)];
                }, 50);
            } else {
                clearInterval(timer); 
                rolling = false; 
                config.totalDraws--;
                showWinner();
            }
        }

        function showWinner() {
            let winners = [];
            for(let i=0; i<config.perDraw; i++) {
                if(config.names.length > 0) {
                    const idx = Math.floor(Math.random() * config.names.length);
                    winners.push(config.names.splice(idx, 1)[0]);
                }
            }
            document.getElementById('winner-name').innerText = winners.join('\n');
            document.getElementById('winner-ui').style.display = 'flex';
            confetti({ particleCount: 200, spread: 100, origin: { y: 0.6 } });
        }

        function reset() {
            document.getElementById('winner-ui').style.display = 'none';
            document.getElementById('roll-text').innerText = "READY";
        }
    </script>
</body>
</html>

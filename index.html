<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>亞護開發 2026 春酒抽獎</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>

body,html{
margin:0;
padding:0;
width:100%;
height:100%;
overflow:hidden;
background:black;
font-family:sans-serif;
}

.main-stage{
position:relative;
width:100vw;
height:100vh;
background:url('yahu.jpg') center/cover no-repeat;
transition:0.5s;
}

.ready-mode{
background:url('準備.jpg') center/cover no-repeat;
}

/* 開始遊戲 /

#start-trigger{
position:absolute;
width:30%;
height:12%;
top:60%;
left:50%;
transform:translate(-50%,-50%);
cursor:pointer;
}

/ 抽獎 /

#draw-trigger{
position:absolute;
width:22%;
height:8%;
top:76%;
left:50%;
transform:translate(-50%,-50%);
cursor:pointer;
display:none;
}

/ 系統設定 /

#admin-trigger{
position:absolute;
top:20px;
left:20px;
font-size:30px;
cursor:pointer;
display:none;
color:white;
}

/ 音樂 /

#music-btn{
position:absolute;
top:20px;
right:20px;
background:rgba(0,0,0,0.6);
color:white;
padding:10px 15px;
border-radius:10px;
cursor:pointer;
font-size:18px;
}

/ 人數統計 /

#stats{
position:absolute;
top:20px;
left:50%;
transform:translateX(-50%);
color:white;
font-size:22px;
letter-spacing:2px;
display:none;
}

/ 滾動 /

#rolling-ui{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.92);
display:none;
flex-direction:column;
align-items:center;
justify-content:center;
}

.rolling-name{
font-size:90px;
color:white;
font-weight:bold;
text-shadow:0 0 40px #fccd4d;
}

/ 得獎 /

#winner-ui{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
display:none;
flex-direction:column;
align-items:center;
justify-content:center;
}

.winner-name{
font-size:100px;
color:white;
font-weight:bold;
text-shadow:0 0 50px #fccd4d;
text-align:center;
}

/ 後台 */

#admin-panel{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(20,10,10,0.98);
display:none;
z-index:100;
padding:30px;
box-sizing:border-box;
color:white;
}

.admin-input{
width:100%;
background:#222;
border:1px solid #444;
color:white;
padding:15px;
margin:15px 0;
font-size:18px;
}

.save-btn{
background:#fccd4d;
border:none;
color:black;
padding:15px;
font-weight:bold;
border-radius:5px;
cursor:pointer;
width:100%;
}

</style>
</head>

<body>

<div class="main-stage" id="stage">

<div id="music-btn" onclick="toggleMusic()">🔊</div>

<div id="admin-trigger" onclick="showAdmin()">⚙️</div>

<div id="stats"></div>

<div id="start-trigger" onclick="goToReady()"></div>

<div id="draw-trigger" onclick="runLottery()"></div>

<div id="rolling-ui">

<div style="color:#fccd4d;font-size:32px;margin-bottom:40px;">
抽獎進行中
</div>

<div id="rolling-name" class="rolling-name"></div>

</div>

<div id="winner-ui" onclick="reset()">

<div style="color:#fccd4d;font-size:30px;margin-bottom:20px;">
天選之人
</div>

<div id="winner-name" class="winner-name"></div>

<div style="margin-top:40px;color:#aaa">
點擊畫面繼續
</div>

</div>

</div>

<div id="admin-panel">

<h2 style="color:#fccd4d">抽獎系統設定</h2>

<p>抽獎名單 (一行一人)</p>

<textarea id="admin-names" class="admin-input" rows="10"></textarea>

<p>單次抽出幾人</p>

<input type="number" id="admin-per" class="admin-input" value="1">

<p>得獎字體大小</p>

<input type="text" id="admin-size" class="admin-input" value="80px">

<button class="save-btn" onclick="saveAdmin()">儲存設定</button>

</div>

<audio id="bgm" src="music.m4a" loop></audio>

<script>

let rolling=false
let timer
let musicOn=true

let config={
names:[],
allNames:[],
perDraw:1,
fontSize:"80px"
}

const audio=document.getElementById("bgm")

function toggleMusic(){

if(musicOn){

audio.pause()
document.getElementById("music-btn").innerText="🔇"
musicOn=false

}else{

audio.play()
document.getElementById("music-btn").innerText="🔊"
musicOn=true

}

}

function goToReady(){

document.getElementById("stage").classList.add("ready-mode")

document.getElementById("start-trigger").style.display="none"

document.getElementById("draw-trigger").style.display="block"

document.getElementById("admin-trigger").style.display="block"

document.getElementById("stats").style.display="block"

updateStats()

if(musicOn){

audio.currentTime=0
audio.play()

}

}

function updateStats(){

let total=config.allNames.length
let remain=config.names.length
let used=total-remain

document.getElementById("stats").innerText=
"參與人數："+total+"　已抽："+used+"　剩餘："+remain

}

function runLottery(){

if(rolling) return

if(config.names.length==0){

alert("名單已抽完")

return

}

rolling=true

document.getElementById("rolling-ui").style.display="flex"

timer=setInterval(()=>{

let name=config.names[Math.floor(Math.random()*config.names.length)]

document.getElementById("rolling-name").innerText=name

},60)

setTimeout(()=>{

clearInterval(timer)

rolling=false

showWinner()

},5000)

}

function showWinner(){

document.getElementById("rolling-ui").style.display="none"

let winners=[]

for(let i=0;i<config.perDraw;i++){

if(config.names.length>0){

let index=Math.floor(Math.random()*config.names.length)

winners.push(config.names.splice(index,1)[0])

}

}

let win=document.getElementById("winner-name")

win.innerText=winners.join("\n")

win.style.fontSize=config.fontSize

document.getElementById("winner-ui").style.display="flex"

audio.pause()

confetti({
particleCount:250,
spread:120,
origin:{y:0.6}
})

updateStats()

}

function reset(){

document.getElementById("winner-ui").style.display="none"

if(musicOn){
audio.play()
}

}

function showAdmin(){
document.getElementById("admin-panel").style.display="block"
}

function saveAdmin(){

config.names=document.getElementById("admin-names").value
.split("\n")
.filter(n=>n.trim()!="")

config.allNames=[...config.names]

config.perDraw=parseInt(document.getElementById("admin-per").value)

config.fontSize=document.getElementById("admin-size").value

document.getElementById("admin-panel").style.display="none"

updateStats()

}

</script>

</body>
</html>

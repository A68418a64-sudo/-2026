<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>亞護開發 2026</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: sans-serif; }
        .main-stage {
            position: relative; width: 100vw; height: 100vh;
            background: url('yahu.jpg.PNG') center/contain no-repeat;
            background-color: #000;
        }
        .ready-mode { background-image: url('ready.jpg.PNG') !important; }

        /* 標題文字區 */
        #main-title {
            position: absolute; top: 48%; left: 50%; transform: translate(-50%, -50%);
            width: 100%; text-align: center; color: #fccd4d; font-weight: bold;
            font-size: 45px; text-shadow: 0 0 20px rgba(0,0,0,0.8); z-index: 10; display: none;
        }

        /* 滾動文字顯示區 (對準圖片中的 READY 框) */
        #roll-text {
            position: absolute; top: 71%; left: 50%; transform: translate(-50%, -50%);
            font-weight: bold; color: #fff; text-shadow: 0 0 30px #fccd4d;
            z-index: 5; display: none; width: 80%; text-align: center; pointer-events: none;
        }

        #draw-trigger { position: absolute; width: 35%; height: 10%; top: 89%; left: 50%; transform: translate(-50%, -50%); cursor: pointer; z-index: 99; display: none; }
        #admin-trigger { position: absolute; width: 30%; height: 10%; bottom: 0%; left: 50%; transform: translateX(-50%); cursor: pointer; z-index: 99; display: none; }

        #winner-ui {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 2000; display: none; flex-direction: column; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.95);
        }
        .winner-name { color: #fff; text-shadow: 0 0 50px #fccd4d; font-weight: bold; text-align: center; line-height: 1.2; }

        /* 設定面板 */
        #admin-panel {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.98); z-index: 9999; display: none; color: white; padding: 30px; box-sizing: border-box; overflow-y: auto;
        }
        .admin-input { width: 100%; background: #222; color: #fff; border: 1px solid #444; padding: 12px; margin: 8px 0; font-size: 18px; border-radius: 10px; }
        .save-btn { background: #fccd4d; color: #000; padding: 15px 50px; border: none; font-weight: bold; font-size: 22px; border-radius: 15px; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="main-stage" id="stage">
        <div id="start-trigger" style="position: absolute; width: 45%; height: 18%; top: 59%; left: 50%; transform: translate(-50%, -50%); cursor: pointer; z-index: 99;" onclick="goToReady()"></div>
        
        <div id="main-title">2026 亞護開發春酒抽獎</div>
        <div id="roll-text"></div>
        <div id="draw-trigger" onclick="startAutoDraw()"></div>
        <div id="admin-trigger" onclick="showAdmin()"></div>

        <div id="winner-ui" onclick="reset()">
            <div style="color:#fccd4d; font-size:35px; letter-spacing:10px; margin-bottom:25px;">恭喜獲得</div>
            <div id="winner-name" class="winner-name"></div>
            <div style="color:#888; margin-top:50px; font-size:22px;">點擊螢幕繼續</div>
        </div>
    </div>

    <div id="admin-panel">
        <h2 style="color:#fccd4d; margin-top:0;">抽獎系統後台設定</h2>
        <p>1. 修改主標題內容：</p>
        <input type="text" id="admin-title-input" class="admin-input" value="2026 亞護開發春酒抽獎">
        
        <p>2. 名單設定 (一人一行)：</p>
        <textarea id="admin-names" class="admin-input" rows="6" placeholder="王小明..."></textarea>
        
        <div style="display:flex; gap:15px; flex-wrap: wrap;">
            <div style="flex:1; min-width: 150px;">每次抽出人數：<input type="number" id="admin-per" class="admin-input" value="1"></div>
            <div style="flex:1; min-width: 150px;">名單字體大小：<input type="number" id="admin-font" class="admin-input" value="80"></div>
        </div>
        
        <center><button class="save-btn" onclick="hideAdmin()">儲存並關閉</button></center>
    </div>

    <audio id="mulan-audio" src="music.mp3.m4a"></audio>

    <script>
        let rolling = false; let timer; 
        let config = { names: [], perDraw: 1, title: "2026 亞護開發春酒抽獎", fontSize: 80 };
        const audio = document.getElementById('mulan-audio');

        function showAdmin() { document.getElementById('admin-panel').style.display = 'block'; }
        
        function hideAdmin() {
            const rawNames = document.getElementById('admin-names').value.split('\n').filter(n => n.trim() !== "");
            config.names = rawNames;
            config.perDraw = parseInt(document.getElementById('admin-per').value);
            config.title = document.getElementById('admin-title-input').value;
            config.fontSize = parseInt(document.getElementById('admin-font').value);
            
            // 即時更新標題與字體
            document.getElementById('main-title').innerText = config.title;
            document.getElementById('roll-text').style.fontSize = config.fontSize + "px";
            document.getElementById('winner-name').style.fontSize = (config.fontSize * 1.2) + "px";
            
            document.getElementById('admin-panel').style.display = 'none';
        }

        function goToReady() {
            document.getElementById('stage').classList.add('ready-mode');
            document.getElementById('main-title').style.display = 'block';
            document.getElementById('roll-text').style.display = 'block';
            document.getElementById('draw-trigger').style.display = 'block';
            document.getElementById('admin-trigger').style.display = 'block';
            audio.play();
        }

        function startAutoDraw() {
            if (config.names.length === 0 && !rolling) { alert("⚠️ 請先設定名單！"); return; }
            if (rolling) return;
            rolling = true; 
            timer = setInterval(() => {
                document.getElementById('roll-text').innerText = config.names[Math.floor(Math.random() * config.names.length)];
            }, 50);
            setTimeout(() => {
                clearInterval(timer);
                rolling = false;
                showWinner();
            }, 5000); 
        }

        function showWinner() {
            let winners = [];
            for(let i=0; i<config.perDraw; i++) {
                if(config.names.length > 0) {
                    const idx = Math.floor(Math.random() * config.names.length);
                    winners.push(config.names.splice(idx, 1)[0]);
                }
            }
            document.getElementById('winner-name').innerText = winners.join('\n');
            document.getElementById('winner-ui').style.display = 'flex';
            confetti({ particleCount: 200, spread: 100, origin: { y: 0.6 } });
        }

        function reset() {
            document.getElementById('winner-ui').style.display = 'none';
            document.getElementById('roll-text').innerText = ""; 
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>2026 亞護開發春酒抽獎</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>

body,html{
margin:0;
padding:0;
width:100%;
height:100%;
overflow:hidden;
font-family:sans-serif;
}

.stage{
width:100vw;
height:100vh;
background:url("yahu.jpg") center/cover no-repeat;
position:relative;
}

.ready{
background:url("ready.jpg") center/cover no-repeat;
}

/* 第一畫面開始 */

.start-btn{
position:absolute;
top:58%;
left:50%;
transform:translate(-50%,-50%);
width:32%;
height:12%;
cursor:pointer;
}

/* 抽獎按鈕 */

.draw-btn{
position:absolute;
top:77%;
left:50%;
transform:translate(-50%,-50%);
width:22%;
height:8%;
cursor:pointer;
display:none;
}

/* 音樂 */

.music{
position:absolute;
top:20px;
right:20px;
background:rgba(0,0,0,0.6);
color:white;
padding:10px 15px;
border-radius:10px;
cursor:pointer;
display:none;
}

/* 系統設定 */

.setting{
position:absolute;
top:20px;
right:90px;
background:rgba(0,0,0,0.6);
color:white;
padding:10px 15px;
border-radius:10px;
cursor:pointer;
display:none;
}

/* 人數顯示 */

.counter{
position:absolute;
top:20px;
left:20px;
background:rgba(0,0,0,0.6);
color:white;
padding:12px 18px;
border-radius:10px;
font-size:18px;
display:none;
}

/* 抽獎滾動 */

.rolling{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
color:white;
}

.rolling-name{
font-size:90px;
text-shadow:0 0 40px gold;
}

/* 得獎 */

.winner{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
color:white;
}

.winner-name{
font-size:100px;
text-shadow:0 0 50px gold;
}

/* 系統設定 */

.admin{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.95);
display:none;
padding:40px;
color:white;
}

input,textarea{
width:100%;
padding:10px;
margin:10px 0;
background:#222;
color:white;
border:1px solid #444;
}

button{
padding:12px 20px;
background:gold;
border:none;
cursor:pointer;
}

</style>
</head>

<body>

<div class="stage" id="stage">

<div class="start-btn" onclick="startGame()"></div>

<div class="draw-btn" id="drawBtn" onclick="startLottery()"></div>

<div class="music" id="musicBtn" onclick="toggleMusic()">🔊</div>

<div class="setting" id="settingBtn" onclick="openAdmin()">⚙</div>

<div class="counter" id="counter">
參與 0 人<br>
已抽 0 人<br>
剩餘 0 人
</div>

<div class="rolling" id="rolling">
<div style="margin-bottom:40px;font-size:30px;">抽獎進行中</div>
<div id="rollingName" class="rolling-name"></div>
</div>

<div class="winner" id="winner" onclick="closeWinner()">
<div style="margin-bottom:30px;font-size:30px;">天選之人</div>
<div id="winnerName" class="winner-name"></div>
</div>

</div>

<div class="admin" id="admin">

<h2>⚙ 抽獎系統設定</h2>

<p>參與名單 (一行一人)</p>
<textarea id="names" rows="10"></textarea>

<p>一次抽幾人</p>
<input id="perDraw" type="number" value="1">

<br><br>

<button onclick="saveAdmin()">儲存設定</button>

</div>

<audio id="bgm" src="music.m4a" loop></audio>

<script>

let names=[]
let totalPeople=0
let drawnPeople=0
let perDraw=1
let timer

const audio=document.getElementById("bgm")

function startGame(){

document.getElementById("stage").classList.add("ready")

document.querySelector(".start-btn").style.display="none"

document.getElementById("drawBtn").style.display="block"

document.getElementById("musicBtn").style.display="block"

document.getElementById("settingBtn").style.display="block"

document.getElementById("counter").style.display="block"

audio.play()

}

function toggleMusic(){

if(audio.paused){

audio.play()
document.getElementById("musicBtn").innerText="🔊"

}else{

audio.pause()
document.getElementById("musicBtn").innerText="🔇"

}

}

function openAdmin(){

document.getElementById("admin").style.display="block"

}

function saveAdmin(){

names=document.getElementById("names").value
.split("\n")
.filter(n=>n.trim()!="")

perDraw=parseInt(document.getElementById("perDraw").value)

totalPeople=names.length
drawnPeople=0

updateCounter()

document.getElementById("admin").style.display="none"

}

function updateCounter(){

let remain=totalPeople-drawnPeople

document.getElementById("counter").innerHTML=
`參與 ${totalPeople} 人<br>
已抽 ${drawnPeople} 人<br>
剩餘 ${remain} 人`

}

function startLottery(){

if(names.length==0){

alert("請先設定名單")

return

}

document.getElementById("rolling").style.display="flex"

timer=setInterval(()=>{

let name=names[Math.floor(Math.random()*names.length)]

document.getElementById("rollingName").innerText=name

},80)

setTimeout(()=>{

clearInterval(timer)

showWinner()

},5000)

}

function showWinner(){

document.getElementById("rolling").style.display="none"

let winners=[]

for(let i=0;i<perDraw;i++){

if(names.length>0){

let index=Math.floor(Math.random()*names.length)

winners.push(names.splice(index,1)[0])

drawnPeople++

}

}

updateCounter()

document.getElementById("winnerName").innerText=winners.join("\n")

document.getElementById("winner").style.display="flex"

confetti({
particleCount:200,
spread:100,
origin:{y:0.6}
})

}

function closeWinner(){

document.getElementById("winner").style.display="none"

}

</script>

</body>
</html>

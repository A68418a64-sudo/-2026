<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>亞護開發 2026 抽獎</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: sans-serif; }
        
        /* 核心修正：背景圖路徑必須與 GitHub 檔案名完全一致 */
        .main-container {
            position: relative; width: 100vw; height: 100vh;
            background: url('bg-main.jpg.JPG') center/contain no-repeat;
        }

        /* 互動區域：對準您的紅框座標 */
        .slot-machine-zone {
            position: absolute; top: 48%; left: 50%; transform: translate(-50%, -50%);
            width: 45%; height: 28%; display: flex; align-items: center; justify-content: center; z-index: 10;
        }

        /* 調整 READY 文字：讓它更融入工業風 */
        #ready-layer { text-align: center; }
        .ready-title { color: #E0E0E0; font-size: 80px; font-weight: 900; letter-spacing: 8px; margin: 0; opacity: 0.85; }
        .ready-subtitle { color: #E0E0E0; font-size: 28px; font-weight: bold; margin-top: -5px; opacity: 0.8; }

        /* 抽獎名單層 */
        #lotto-layer {
            display: none; color: #FFFFFF; font-weight: 900; text-align: center;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.7); line-height: 1.1;
        }

        /* 透明按鈕：對準「開始抽獎」金色按鈕位置 (X:510, Y:560) */
        #start-hotspot {
            position: absolute; top: 76.5%; left: 50%; transform: translate(-50%, -50%);
            width: 20%; height: 8%; cursor: pointer; z-index: 20; background: rgba(255,0,0,0); /* 完全透明 */
        }

        /* 透明按鈕：對準最下方的「系統設定」文字位置 (X:600, Y:720) */
        #setting-hotspot {
            position: absolute; bottom: 3%; left: 50%; transform: translateX(-50%);
            width: 120px; height: 40px; cursor: pointer; z-index: 20; background: rgba(0,255,0,0); /* 完全透明 */
        }

        /* 控制面板彈窗 */
        #admin-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(20, 10, 10, 0.98); z-index: 100; display: none; color: #fff; padding: 40px; box-sizing: border-box;
        }
        .field { margin-bottom: 20px; }
        textarea, input { width: 100%; padding: 15px; background: #2a1a1a; border: 1px solid #4a3a3a; color: #fff; border-radius: 8px; font-size: 18px; }
        .save-btn { width: 100%; background: #FCCD4D; color: #311; padding: 18px; border: none; font-weight: bold; font-size: 22px; border-radius: 12px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="slot-machine-zone">
            <div id="ready-layer">
                <p class="ready-title">READY</p>
                <p class="ready-subtitle">準備開獎</p>
            </div>
            <div id="lotto-layer"></div>
        </div>

        <div id="start-hotspot" onclick="runLottery()"></div>
        <div id="setting-hotspot" onclick="toggleModal()"></div>
    </div>

    <div id="admin-modal">
        <h2 style="color: #FCCD4D;">⚙️ 抽獎控制面板 (亞護開發專用)</h2>
        <div class="field">
            <label>匯入抽獎名單 (一人一行)</label>
            <textarea id="name-list" rows="10" placeholder="請輸入姓名名單..."></textarea>
        </div>
        <div class="field">
            <label>單次抽出人數</label>
            <input type="number" id="pick-count" value="1">
        </div>
        <div class="field">
            <label>名單大小 (如: 70px)</label>
            <input type="text" id="font-size-val" value="70px">
        </div>
        <button class="save-btn" onclick="saveSettings()">💾 儲存並關閉設定</button>
        <p style="text-align: center; color: #888; font-size: 14px; margin-top: 20px;">儲存後即可點擊「開始抽獎」</p>
    </div>

    <audio id="sfx" src="music.mp3.m4a"></audio>

    <script>
        let isActive = false;
        let data = { names: [], count: 1, size: "70px" };
        const sfx = document.getElementById('sfx');

        function toggleModal() {
            const m = document.getElementById('admin-modal');
            m.style.display = m.style.display === 'block' ? 'none' : 'block';
        }

        function saveSettings() {
            data.names = document.getElementById('name-list').value.split('\n').filter(n => n.trim() !== "");
            data.count = parseInt(document.getElementById('pick-count').value);
            data.size = document.getElementById('font-size-val').value;
            document.getElementById('lotto-layer').style.fontSize = data.size;
            toggleModal();
        }

        function runLottery() {
            if (data.names.length === 0) { 
                toggleModal(); // 若無名單，自動開啟設定面板
                return; 
            }
            if (isActive) return;

            isActive = true;
            sfx.play();

            document.getElementById('ready-layer').style.display = 'none';
            const display = document.getElementById('lotto-layer');
            display.style.display = 'block';

            const cycle = setInterval(() => {
                display.innerText = data.names[Math.floor(Math.random() * data.names.length)];
            }, 60);

            setTimeout(() => {
                clearInterval(cycle);
                isActive = false;
                
                let winners = [];
                for(let i=0; i < data.count; i++) {
                    if(data.names.length > 0) {
                        let idx = Math.floor(Math.random() * data.names.length);
                        winners.push(data.names.splice(idx, 1)[0]);
                    }
                }
                display.innerHTML = winners.join('<br>');
                confetti({ particleCount: 250, spread: 120, origin: { y: 0.6 } });
            }, 7000);
        }
    </script>
</body>
</html>

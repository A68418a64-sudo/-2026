<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>亞護開發 2026 春酒抽獎</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>

body,html{
margin:0;
padding:0;
width:100%;
height:100%;
overflow:hidden;
background:black;
font-family:"Microsoft JhengHei",sans-serif;
}

.main-stage{
position:relative;
width:100vw;
height:100vh;
background:url('./yahu.jpg.PNG') center/cover no-repeat;
transition:0.5s;
}

.ready-mode{
background-image:url('./ready.jpg.JPG') !important;
}

/* 剩餘人數顯示 */

.stats{

position:absolute;

top:18%;

left:50%;

transform:translateX(-50%);

color:white;

font-size:28px;

letter-spacing:3px;

text-shadow:0 0 15px rgba(0,0,0,0.8);

}

/* 按鈕區 */

#start-trigger{
position:absolute;
width:32%;
height:12%;
top:59%;
left:50%;
transform:translate(-50%,-50%);
cursor:pointer;
z-index:10;
}

#draw-trigger{
position:absolute;
width:22%;
height:8%;
top:76%;
left:50%;
transform:translate(-50%,-50%);
cursor:pointer;
z-index:10;
display:none;
}

#admin-trigger{
position:absolute;
width:20%;
height:5%;
bottom:3%;
left:50%;
transform:translateX(-50%);
cursor:pointer;
z-index:10;
display:none;
}

/* 音樂 */

#music-btn{

position:absolute;
top:20px;
right:20px;

background:rgba(0,0,0,0.6);
color:white;

padding:10px 15px;

border-radius:10px;

cursor:pointer;

z-index:50;

font-size:18px;

}

/* 滾動畫面 */

#rolling-ui{

position:absolute;
top:0;
left:0;
width:100%;
height:100%;

background:rgba(0,0,0,0.92);

display:none;

flex-direction:column;
align-items:center;
justify-content:center;

z-index:20;

}

.rolling-name{

font-size:90px;
color:white;
font-weight:bold;
text-shadow:0 0 40px #fccd4d;

}

/* 得獎畫面 */

#winner-ui{

position:absolute;
top:0;
left:0;
width:100%;
height:100%;

background:rgba(0,0,0,0.92);

display:none;

flex-direction:column;
align-items:center;
justify-content:center;

z-index:25;

cursor:pointer;

}

.winner-name{

font-size:100px;
color:white;
font-weight:bold;
text-shadow:0 0 50px #fccd4d;
text-align:center;

white-space:pre-line;

}

/* 管理面板 */

#admin-panel{

position:fixed;
top:0;
left:0;
width:100%;
height:100%;

background:rgba(20,10,10,0.98);

display:none;

z-index:100;

padding:30px;

box-sizing:border-box;

color:white;

overflow:auto;

}

.admin-input{

width:100%;
background:#222;
border:1px solid #444;
color:white;
padding:15px;
margin:15px 0;
font-size:18px;

}

.save-btn{

background:#fccd4d;
border:none;
color:black;
padding:15px;
font-weight:bold;
border-radius:5px;
cursor:pointer;
width:100%;

}

</style>
</head>

<body>

<div class="main-stage" id="stage">

<div id="music-btn" onclick="toggleMusic()">🔊</div>

<div class="stats" id="stats">
剩餘 0 人　已抽 0 人
</div>

<div id="start-trigger" onclick="goToReady()"></div>

<div id="draw-trigger" onclick="runLottery()"></div>

<div id="admin-trigger" onclick="showAdmin()"></div>

<div id="rolling-ui">

<div style="color:#fccd4d;font-size:32px;margin-bottom:40px;letter-spacing:8px;">
抽獎進行中
</div>

<div id="rolling-name" class="rolling-name"></div>

</div>

<div id="winner-ui" onclick="reset()">

<div style="color:#fccd4d;font-size:30px;margin-bottom:20px;letter-spacing:10px;">
天選之人
</div>

<div id="winner-name" class="winner-name"></div>

<div style="color:#aaa;margin-top:40px;">
點擊畫面繼續
</div>

</div>

</div>

<div id="admin-panel">

<h2 style="color:#fccd4d">抽獎系統設定</h2>

<p>抽獎名單 (一人一行)</p>

<textarea id="admin-names" class="admin-input" rows="10"></textarea>

<p>
單次抽出幾人
<input type="number" id="admin-per" class="admin-input" style="width:120px" value="1">
</p>

<p>
得獎字體大小
<input type="text" id="admin-size" class="admin-input" style="width:150px" value="80px">
</p>

<button class="save-btn" onclick="hideAdmin()">儲存設定</button>

</div>

<audio id="bgm" src="music.mp3.m4a" loop></audio>

<script>

let rolling=false
let timer
let musicOn=true

let config={
names:[],
perDraw:1,
fontSize:"80px",
drawn:[]
}

const audio=document.getElementById("bgm")

function updateStats(){

let remain=config.names.length

let drawn=config.drawn.length

document.getElementById("stats").innerText=
`剩餘 ${remain} 人　已抽 ${drawn} 人`

}

function toggleMusic(){

if(musicOn){

audio.pause()
document.getElementById("music-btn").innerText="🔇"
musicOn=false

}else{

audio.play()
document.getElementById("music-btn").innerText="🔊"
musicOn=true

}

}

function showAdmin(){
document.getElementById("admin-panel").style.display="block"
}

function hideAdmin(){

config.names=document.getElementById("admin-names").value
.split("\n")
.map(n=>n.trim())
.filter(n=>n!="")

config.drawn=[]

config.perDraw=parseInt(document.getElementById("admin-per").value)

config.fontSize=document.getElementById("admin-size").value

document.getElementById("admin-panel").style.display="none"

updateStats()

}

function goToReady(){

document.getElementById("start-trigger").style.display="none"

document.getElementById("stage").classList.add("ready-mode")

document.getElementById("draw-trigger").style.display="block"

document.getElementById("admin-trigger").style.display="block"

updateStats()

if(musicOn){

audio.currentTime=0
audio.play()

}

}

function runLottery(){

if(rolling) return

if(config.names.length==0){

alert("沒有剩餘名單")

return

}

rolling=true

document.getElementById("rolling-ui").style.display="flex"

timer=setInterval(()=>{

let name=config.names[Math.floor(Math.random()*config.names.length)]

document.getElementById("rolling-name").innerText=name

},60)

setTimeout(()=>{

clearInterval(timer)

rolling=false

showWinner()

},5000)

}

function showWinner(){

document.getElementById("rolling-ui").style.display="none"

let winners=[]

for(let i=0;i<config.perDraw;i++){

if(config.names.length>0){

let index=Math.floor(Math.random()*config.names.length)

let winner=config.names.splice(index,1)[0]

config.drawn.push(winner)

winners.push(winner)

}

}

let winText=document.getElementById("winner-name")

winText.innerText=winners.join("\n")

winText.style.fontSize=config.fontSize

document.getElementById("winner-ui").style.display="flex"

updateStats()

confetti({
particleCount:250,
spread:120,
origin:{y:0.6}
})

}

function reset(){

document.getElementById("winner-ui").style.display="none"

document.getElementById("rolling-name").innerText=""

}

</script>

</body>
</html>

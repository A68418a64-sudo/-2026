<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>亞護開發 2026 春酒抽獎</title>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background: black;
            font-family: "Microsoft JhengHei", sans-serif;
        }

        .main-stage {
            position: relative;
            width: 100vw;
            height: 100vh;
            /* 修正為你截圖中的最新檔名 */
            background: url('yahu.jpg') center/cover no-repeat;
            transition: 0.5s;
        }

        /* 當切換到準備抽獎畫面時的背景 */
        .ready-mode {
            background-image: url('ready.jpg') !important;
        }

        /* 人數顯示定位 */
        #dynamic-stats {
            position: absolute;
            top: 50.3%; 
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            justify-content: center;
            gap: 50px; 
            z-index: 5;
            width: 100%;
            pointer-events: none;
            display: none; /* 初始主視覺不顯示人數，進入 READY 才顯示 */
        }

        .stat-item {
            color: #fccd4d; 
            font-size: 22px; 
            font-weight: bold;
            letter-spacing: 2px;
            text-shadow: 2px 2px 4px rgba(0,0,0,1);
            display: flex;
            align-items: center;
        }

        /* 點擊區域：從主視覺進入 READY */
        #start-trigger {
            position: absolute;
            width: 32%; height: 12%;
            top: 59%; left: 50%;
            transform: translate(-50%, -50%);
            cursor: pointer;
            z-index: 10;
        }

        /* 點擊區域：開始抽獎 */
        #draw-trigger {
            position: absolute;
            width: 25%; height: 10%;
            top: 86.5%; left: 50%;
            transform: translate(-50%, -50%);
            cursor: pointer;
            z-index: 10;
            display: none;
        }

        #settings-btn {
            position: absolute;
            top: 20px; left: 20px;
            width: 44px; height: 44px;
            color: rgba(255,255,255,0.3);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            z-index: 60;
            font-size: 24px;
        }

        #music-btn {
            position: absolute;
            top: 20px; right: 20px;
            color: rgba(255,255,255,0.3);
            cursor: pointer;
            z-index: 50;
            font-size: 24px;
        }

        /* 抽獎與得獎層 */
        #rolling-ui, #winner-ui {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #rolling-ui { background: rgba(0, 0, 0, 0.88); z-index: 20; }
        #winner-ui { background: rgba(0, 0, 0, 0.92); z-index: 25; cursor: pointer; }

        .rolling-name { font-size: 100px; color: white; font-weight: bold; text-shadow: 0 0 40px #fccd4d; }
        .winner-name { font-size: 110px; color: white; font-weight: bold; text-shadow: 0 0 50px #fccd4d; text-align: center; white-space: pre-wrap; line-height: 1.2; }

        /* 設定面板 */
        #admin-panel {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(10, 10, 10, 0.98);
            display: none;
            z-index: 100;
            padding: 40px 20px;
            box-sizing: border-box;
            color: white;
            overflow-y: auto;
        }

        .admin-content { max-width: 500px; margin: 0 auto; }
        .admin-input { width: 100%; background: #222; border: 1px solid #555; color: white; padding: 12px; margin: 10px 0 20px 0; font-size: 18px; border-radius: 8px; box-sizing: border-box; }
        .save-btn { background: #fccd4d; border: none; color: black; padding: 18px; font-weight: bold; border-radius: 8px; cursor: pointer; width: 100%; font-size: 20px; }
    </style>
</head>

<body>

    <div class="main-stage" id="stage">
        <div id="dynamic-stats">
            <div class="stat-item"><i class="fas fa-users" style="margin-right:10px; font-size:18px;"></i> 剩餘 <span id="count-remain">0</span> 人</div>
            <div class="stat-item">已抽 <span id="count-pulled">0</span> 人</div>
        </div>

        <div id="settings-btn" onclick="showAdmin()"><i class="fas fa-cog"></i></div>
        <div id="music-btn" onclick="toggleMusic()">🔇</div>

        <div id="start-trigger" onclick="goToReady()"></div>
        <div id="draw-trigger" onclick="runLottery()"></div>

        <div id="rolling-ui">
            <div style="color:#fccd4d; font-size:32px; margin-bottom:40px; letter-spacing:10px;">抽獎進行中</div>
            <div id="rolling-name" class="rolling-name"></div>
        </div>

        <div id="winner-ui" onclick="reset()">
            <div style="color:#fccd4d; font-size:30px; margin-bottom:20px; letter-spacing:12px;">恭喜獲獎</div>
            <div id="winner-name" class="winner-name"></div>
            <div style="color:#aaa; margin-top:50px;">點擊畫面繼續</div>
        </div>
    </div>

    <div id="admin-panel">
        <div class="admin-content">
            <h2 style="color:#fccd4d; text-align: center;">系統設定面板</h2>
            <label>名單 (一人一行)</label>
            <textarea id="admin-names" class="admin-input" rows="10" placeholder="請貼入名單..."></textarea>
            
            <label>單次抽出人數</label>
            <input type="number" id="admin-per" class="admin-input" value="1">

            <label>得獎名字字體大小</label>
            <input type="text" id="admin-size" class="admin-input" value="110px">

            <button class="save-btn" onclick="hideAdmin()">儲存並連動人數</button>
        </div>
    </div>

    <audio id="bgm" src="music.m4a" loop></audio>

    <script>
        let rolling = false;
        let timer;
        let musicOn = false;
        let pulledCount = 0;
        let config = { names: [], perDraw: 1, fontSize: "110px" };

        const audio = document.getElementById("bgm");

        function updateStatUI() {
            document.getElementById("count-remain").innerText = config.names.length;
            document.getElementById("count-pulled").innerText = pulledCount;
        }

        function toggleMusic() {
            if (musicOn) {
                audio.pause();
                document.getElementById("music-btn").innerText = "🔇";
            } else {
                audio.play();
                document.getElementById("music-btn").innerText = "🔊";
            }
            musicOn = !musicOn;
        }

        function showAdmin() { document.getElementById("admin-panel").style.display = "block"; }

        function hideAdmin() {
            const rawNames = document.getElementById("admin-names").value;
            config.names = rawNames.split("\n").map(n => n.trim()).filter(n => n !== "");
            config.perDraw = parseInt(document.getElementById("admin-per").value) || 1;
            config.fontSize = document.getElementById("admin-size").value;
            
            pulledCount = 0; 
            updateStatUI();
            document.getElementById("admin-panel").style.display = "none";
        }

        function goToReady() {
            document.getElementById("start-trigger").style.display = "none";
            document.getElementById("stage").classList.add("ready-mode");
            document.getElementById("draw-trigger").style.display = "block";
            document.getElementById("dynamic-stats").style.display = "flex";
            if (musicOn) { audio.currentTime = 0; audio.play(); }
        }

        function runLottery() {
            if (rolling || config.names.length === 0) return;
            rolling = true;
            document.getElementById("rolling-ui").style.display = "flex";
            timer = setInterval(() => {
                document.getElementById("rolling-name").innerText = 
                    config.names[Math.floor(Math.random() * config.names.length)];
            }, 60);
            setTimeout(() => {
                clearInterval(timer);
                rolling = false;
                showWinner();
            }, 7000);
        }

        function showWinner() {
            document.getElementById("rolling-ui").style.display = "none";
            let winners = [];
            for (let i = 0; i < config.perDraw; i++) {
                if (config.names.length > 0) {
                    let index = Math.floor(Math.random() * config.names.length);
                    winners.push(config.names.splice(index, 1)[0]);
                    pulledCount++;
                }
            }
            const winDisplay = document.getElementById("winner-name");
            winDisplay.innerText = winners.join("\n");
            winDisplay.style.fontSize = config.fontSize;
            document.getElementById("winner-ui").style.display = "flex";
            updateStatUI();
            confetti({ particleCount: 250, spread: 100, origin: { y: 0.6 } });
        }

        function reset() { document.getElementById("winner-ui").style.display = "none"; }
        
        updateStatUI();
    </script>
</body>
</html>

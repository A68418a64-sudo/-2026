<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026亞護春酒抽獎</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>

body,html{
margin:0;
padding:0;
height:100%;
width:100%;
overflow:hidden;
background:black;
font-family:sans-serif;
}

.stage{
position:relative;
width:100vw;
height:100vh;
background:url("yahu.jpg.PNG") center/cover no-repeat;
}

.ready-mode{
background:url("ready.jpg.PNG") center/cover no-repeat;
}

#music-btn{
position:fixed;
top:20px;
right:20px;
width:55px;
height:55px;
border-radius:50%;
background:black;
color:white;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
cursor:pointer;
z-index:9999;
}

#setting-btn{
position:fixed;
top:20px;
left:20px;
width:55px;
height:55px;
border-radius:50%;
background:black;
color:white;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
cursor:pointer;
z-index:9999;
}

#ready-btn{
position:absolute;
top:52%;
left:50%;
transform:translate(-50%,-50%);
width:40%;
height:20%;
cursor:pointer;
}

#draw-btn{
position:absolute;
top:75%;
left:50%;
transform:translate(-50%,-50%);
width:30%;
height:12%;
cursor:pointer;
display:none;
}

#rolling{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
display:none;
align-items:center;
justify-content:center;
flex-direction:column;
}

.roll-name{
font-size:90px;
color:white;
text-shadow:0 0 40px gold;
}

#winner{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
display:none;
align-items:center;
justify-content:center;
flex-direction:column;
}

.win-name{
font-size:80px;
color:white;
text-shadow:0 0 40px gold;
margin:10px;
}

#setting-panel{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.95);
display:none;
flex-direction:column;
align-items:center;
justify-content:center;
z-index:99999;
color:white;
}

textarea{
width:60%;
height:200px;
font-size:18px;
padding:10px;
}

input{
font-size:18px;
padding:5px;
width:80px;
text-align:center;
}

button{
margin-top:15px;
padding:10px 20px;
font-size:18px;
cursor:pointer;
}

#stats{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
color:white;
font-size:22px;
background:rgba(0,0,0,0.6);
padding:10px 20px;
border-radius:10px;
}

</style>
</head>

<body>

<div id="setting-btn">⚙️</div>
<div id="music-btn">🔊</div>

<div id="stage" class="stage">

<div id="ready-btn"></div>
<div id="draw-btn"></div>

<div id="rolling">
<div style="color:#fccd4d;font-size:40px;margin-bottom:40px">
抽獎進行中
</div>
<div id="roll-name" class="roll-name"></div>
</div>

<div id="winner">
<div style="color:#fccd4d;font-size:40px;margin-bottom:30px">
天選之人
</div>
<div id="winner-list"></div>
</div>

</div>

<div id="stats">
總人數: <span id="total">0</span> |
剩餘: <span id="remain">0</span> |
已抽: <span id="picked">0</span>
</div>

<div id="setting-panel">

<h2>系統設定</h2>

<p>抽獎名單</p>
<textarea id="name-input"></textarea>

<p>一次抽幾人</p>
<input id="draw-count" value="1">

<p>抽獎次數</p>
<input id="draw-times" value="1">

<button onclick="saveSettings()">儲存設定</button>

</div>

<audio id="bgm">
<source src="music.mp3.m4a">
</audio>

<script>

let names=[]
let winners=[]

let drawCount=1
let drawTimes=1

const audio=document.getElementById("bgm")

audio.addEventListener("ended",function(){
audio.currentTime=0
audio.play()
})

let musicOn=true

document.getElementById("music-btn").onclick=function(){
if(musicOn){
audio.pause()
this.innerHTML="🔇"
}else{
audio.play()
this.innerHTML="🔊"
}
musicOn=!musicOn
}

document.getElementById("setting-btn").onclick=function(){
document.getElementById("setting-panel").style.display="flex"
}

function saveSettings(){

let text=document.getElementById("name-input").value

names=text.split("\n").filter(n=>n.trim()!="")

drawCount=parseInt(document.getElementById("draw-count").value)

drawTimes=parseInt(document.getElementById("draw-times").value)

updateStats()

document.getElementById("setting-panel").style.display="none"

}

function updateStats(){

document.getElementById("total").innerText=names.length+winners.length
document.getElementById("remain").innerText=names.length
document.getElementById("picked").innerText=winners.length

}

document.getElementById("ready-btn").onclick=function(){

document.getElementById("stage").classList.add("ready-mode")

document.getElementById("draw-btn").style.display="block"

audio.play()

}

let rolling=false
let timer

document.getElementById("draw-btn").onclick=function(){

if(rolling) return

if(names.length==0){
alert("沒有剩餘名單")
return
}

rolling=true

document.getElementById("rolling").style.display="flex"

timer=setInterval(function(){

let name=names[Math.floor(Math.random()*names.length)]

document.getElementById("roll-name").innerText=name

},60)

setTimeout(function(){

clearInterval(timer)

showWinner()

rolling=false

},5000)

}

function showWinner(){

document.getElementById("rolling").style.display="none"

let result=[]

for(let i=0;i<drawCount;i++){

if(names.length==0) break

let index=Math.floor(Math.random()*names.length)

result.push(names.splice(index,1)[0])

}

winners.push(...result)

let html=""

result.forEach(function(n){
html+="<div class='win-name'>"+n+"</div>"
})

document.getElementById("winner-list").innerHTML=html

document.getElementById("winner").style.display="flex"

confetti({
particleCount:300,
spread:120,
origin:{y:0.6}
})

updateStats()

}

</script>

</body

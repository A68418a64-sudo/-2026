<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2026 亞護開發春酒抽獎</title>
    <style>
        :root {
            --primary-gold: #d4af37;
            --industrial-dark: rgba(20, 20, 20, 0.9);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: "Microsoft JhengHei", sans-serif;
        }

        /* 主視覺容器 */
        .game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: url('yahu.jpg.PNG') no-repeat center center;
            background-size: contain;
        }

        /* 透明熱區：開始抽獎 (對準圖片中的遊戲開始按鈕) */
        #start-btn {
            position: absolute;
            left: 42%; top: 58%;
            width: 16%; height: 8%;
            cursor: pointer;
            z-index: 10;
            /* background: rgba(255,0,0,0.3); // 除錯用，正式環境請註解掉 */
        }

        /* 透明熱區：系統設定 (對準圖片右下角或底部文字) */
        #settings-trigger {
            position: absolute;
            right: 2%; bottom: 2%;
            width: 10%; height: 5%;
            cursor: pointer;
            z-index: 10;
        }

        /* 中央抽獎區域遮罩 (用來擋住 READY 字樣) */
        .result-overlay {
            position: absolute;
            left: 31%; top: 54%; /* 根據你的紅色框框位置微調 */
            width: 38%; height: 18%;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(30, 25, 20, 0.95); /* 模擬背景色 */
            border-radius: 15px;
            z-index: 5;
            overflow: hidden;
        }

        /* 滾動文字與結果字體 */
        #lottery-display {
            color: #fff;
            text-align: center;
            font-weight: bold;
            line-height: 1.2;
            text-shadow: 0 0 10px var(--primary-gold);
            word-break: break-all;
            padding: 10px;
        }

        /* 工業風設定頁面 */
        #settings-panel {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 80%; max-width: 500px;
            background: var(--industrial-dark);
            border: 2px solid var(--primary-gold);
            padding: 20px;
            color: #fff;
            display: none;
            z-index: 100;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
        }

        .setting-item { margin-bottom: 15px; }
        textarea { width: 100%; height: 80px; background: #333; color: #fff; border: 1px solid #666; }
        input[type="number"], input[type="range"] { width: 100%; }
        button.save-btn {
            background: var(--primary-gold);
            border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; width: 100%;
        }

        /* 動態滾動動畫 */
        .rolling { animation: blurRolling 0.1s infinite; }
        @keyframes blurRolling {
            0% { filter: blur(0px); transform: translateY(0); }
            50% { filter: blur(2px); transform: translateY(-5px); }
            100% { filter: blur(0px); transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="game-container">
    <div id="start-btn" onclick="startLottery()"></div>
    <div id="settings-trigger" onclick="toggleSettings()"></div>

    <div id="result-overlay" class="result-overlay">
        <div id="lottery-display">READY</div>
    </div>
</div>

<div id="settings-panel">
    <h3>⚙️ 系統設定 (工業風模式)</h3>
    <div class="setting-item">
        <label>抽獎名單 (每行一個名字):</label>
        <textarea id="name-list">王大明&#10;李小華&#10;張三&#10;李四&#10;趙五</textarea>
    </div>
    <div class="setting-item">
        <label>每次抽取人數:</label>
        <input type="number" id="draw-count" value="1">
    </div>
    <div class="setting-item">
        <label>結果字體大小 (px):</label>
        <input type="range" id="font-size-slider" min="20" max="100" value="40" oninput="updateFontSize(this.value)">
        <span id="font-size-val">40px</span>
    </div>
    <button class="save-btn" onclick="toggleSettings()">儲存並關閉</button>
</div>

<script>
    let names = [];
    let isRolling = false;

    function toggleSettings() {
        const panel = document.getElementById('settings-panel');
        panel.style.display = (panel.style.display === 'block') ? 'none' : 'block';
    }

    function updateFontSize(val) {
        document.getElementById('font-size-val').innerText = val + 'px';
        document.getElementById('lottery-display').style.fontSize = val + 'px';
    }

    function startLottery() {
        if (isRolling) return;

        const listText = document.getElementById('name-list').value.trim();
        names = listText.split('\n').filter(n => n.trim() !== '');
        const drawCount = parseInt(document.getElementById('draw-count').value);

        if (names.length < drawCount) {
            alert('名單人數不足！');
            return;
        }

        isRolling = true;
        const display = document.getElementById('lottery-display');
        const overlay = document.getElementById('result-overlay');
        
        // 顯示遮罩並開始滾動
        overlay.style.display = 'flex';
        display.classList.add('rolling');

        // 模擬拉霸滾動效果
        let rollInterval = setInterval(() => {
            display.innerText = names[Math.floor(Math.random() * names.length)];
        }, 80);

        // 10秒後停止並跳出最終名單
        setTimeout(() => {
            clearInterval(rollInterval);
            display.classList.remove('rolling');
            
            // 隨機抽取指定人數
            let results = [];
            let tempNames = [...names];
            for (let i = 0; i < drawCount; i++) {
                const idx = Math.floor(Math.random() * tempNames.length);
                results.push(tempNames.splice(idx, 1)[0]);
            }

            display.innerText = results.join('、');
            isRolling = false;
        }, 10000); // 10秒
    }

    // 初始化字體大小
    updateFontSize(40);
</script>

</body>
</html>

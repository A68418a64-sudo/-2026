<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 春酒抽獎</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>

body{
margin:0;
font-family:sans-serif;
background:black;
color:white;
overflow:hidden;
}

/* 背景 /

.stage{
position:fixed;
width:100%;
height:100vh;
background:url("yahu.jpg") center/cover no-repeat;
}

.stage.ready{
background:url("ready.jpg") center/cover no-repeat;
}

/ 左上角 /

.hud{
position:fixed;
top:20px;
left:25px;
font-size:20px;
line-height:32px;
color:#f2d089;
}

/ 右上 /

.topbar{
position:fixed;
top:20px;
right:30px;
font-size:26px;
display:flex;
gap:15px;
}

.topbar span{
cursor:pointer;
}

/ 中央 /

.center{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
}

.start-btn{
font-size:40px;
padding:20px 60px;
cursor:pointer;
}

.ready{
display:none;
}

.ready h1{
font-size:80px;
margin:0;
}

.ready p{
font-size:36px;
}

.draw-btn{
font-size:28px;
padding:15px 40px;
cursor:pointer;
}

/ 滾動 /

.roll{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
display:none;
align-items:center;
justify-content:center;
flex-direction:column;
}

.roll-name{
font-size:120px;
text-shadow:0 0 30px gold;
}

/ 得獎 /

.winner{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.95);
display:none;
align-items:center;
justify-content:center;
flex-direction:column;
text-align:center;
}

.winner-title{
font-size:40px;
margin-bottom:40px;
}

.winner-list{
display:grid;
gap:20px;
}

/ 中獎紀錄 /

.history{
position:fixed;
bottom:20px;
left:25px;
font-size:16px;
max-height:200px;
overflow:auto;
}

/ 設定 */

.admin{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:none;
padding:40px;
overflow:auto;
}

textarea,input{
width:100%;
margin:10px 0;
padding:10px;
}

button{
padding:10px 20px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="stage" id="stage"></div>

<div class="hud">
<div>👥 參與人數：<span id="total">0</span></div>
<div>🎯 已抽人數：<span id="drawn">0</span></div>
<div>📉 剩餘人數：<span id="remain">0</span></div>
</div>

<div class="topbar">
<span onclick="toggleMusic()">🔊</span>
<span onclick="openAdmin()">⚙</span>
</div>

<div class="center" id="startScreen">
<button class="start-btn" onclick="enterReady()">開始抽獎</button>
</div>

<div class="center ready" id="readyScreen">
<h1>READY</h1>
<p>準備開獎</p>
<button class="draw-btn" onclick="startRoll()">開始抽獎</button>
</div>

<div class="roll" id="roll">
<div class="roll-name" id="rollName">抽獎中</div>
</div>

<div class="winner" id="winner">
<div class="winner-title">🎉 天選之人 🎉</div>
<div class="winner-list" id="winnerList"></div>
</div>

<div class="history" id="history"></div>

<div class="admin" id="admin">

<h2>抽獎設定</h2>

<p>參與名單 (一行一人)</p>
<textarea id="names" rows="10"></textarea>

<p>一次抽幾人</p>
<input type="number" id="drawCount" value="1">

<p>中獎字體大小</p>
<input type="number" id="fontSize" value="100">

<button onclick="saveAdmin()">儲存</button>

</div>

<audio id="bgm" src="music.m4a" loop></audio>

<script>

let names=[]
let drawn=0
let drawCount=1
let fontSize=100
let round=1

let timer

const audio=document.getElementById("bgm")

function toggleMusic(){

if(audio.paused){
audio.play()
}else{
audio.pause()
}

}

function enterReady(){

document.getElementById("stage").classList.add("ready")

document.getElementById("startScreen").style.display="none"

document.getElementById("readyScreen").style.display="block"

audio.play()

}

function startRoll(){

if(names.length==0){

alert("請先設定名單")

return

}

document.getElementById("roll").style.display="flex"

timer=setInterval(()=>{

let n=names[Math.floor(Math.random()*names.length)]

document.getElementById("rollName").innerText=n

},80)

setTimeout(()=>{

clearInterval(timer)

showWinner()

},4000)

}

function showWinner(){

document.getElementById("roll").style.display="none"

let winners=[]

for(let i=0;i<drawCount;i++){

if(names.length==0) break

let index=Math.floor(Math.random()*names.length)

winners.push(names.splice(index,1)[0])

drawn++

}

updateHUD()

let area=document.getElementById("winnerList")

area.innerHTML=""

area.style.fontSize=fontSize+"px"

area.style.gridTemplateColumns="repeat(2,1fr)"

winners.forEach(n=>{

let div=document.createElement("div")

div.innerText=n

area.appendChild(div)

})

document.getElementById("winner").style.display="flex"

confetti({
particleCount:300,
spread:120,
origin:{y:0.6}
})

updateHistory(winners)

}

function updateHistory(list){

let h=document.getElementById("history")

let html="<div>第"+round+"輪</div>"

list.forEach(n=>{

html+="<div>"+n+"</div>"

})

html+="<br>"

h.innerHTML+=html

round++

}

function updateHUD(){

document.getElementById("total").innerText=names.length+drawn

document.getElementById("drawn").innerText=drawn

document.getElementById("remain").innerText=names.length

}

function openAdmin(){

document.getElementById("admin").style.display="block"

}

function saveAdmin(){

names=document.getElementById("names").value.split("\n").filter(n=>n)

drawCount=parseInt(document.getElementById("drawCount").value)

fontSize=parseInt(document.getElementById("fontSize").value)

drawn=0

round=1

document.getElementById("history").innerHTML=""

updateHUD()

document.getElementById("admin").style.display="none"

}

</script>

</body

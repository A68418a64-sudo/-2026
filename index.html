<!DOCTYPE html>
<html lang="zh-TW">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>2026 亞護春酒抽獎</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>

body,html{
margin:0;
padding:0;
height:100%;
width:100%;
overflow:hidden;
background:black;
}

.stage{
position:relative;
width:100vw;
height:100vh;
background:url("yahu.jpg.PNG") center/cover no-repeat;
}

.ready-mode{
background:url("ready.jpg.PNG") center/cover no-repeat;
}

/* 音樂按鈕 */

#music-btn{
position:fixed;
top:25px;
right:25px;
width:60px;
height:60px;
border-radius:50%;
background:rgba(0,0,0,0.7);
color:white;
font-size:30px;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
z-index:9999;
}

/* 系統設定按鈕 (超好按版) */

#setting-btn{
position:fixed;
top:25px;
left:25px;
padding:15px 22px;
font-size:22px;
background:rgba(0,0,0,0.75);
color:white;
border-radius:12px;
cursor:pointer;
z-index:9999;
}

/* READY */

#ready-btn{
position:absolute;
top:52%;
left:50%;
transform:translate(-50%,-50%);
width:40%;
height:20%;
cursor:pointer;
}

/* 抽獎 */

#draw-btn{
position:absolute;
top:75%;
left:50%;
transform:translate(-50%,-50%);
width:30%;
height:12%;
cursor:pointer;
display:none;
}

/* 滾動 */

#rolling{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
display:none;
align-items:center;
justify-content:center;
flex-direction:column;
z-index:50;
}

.roll-name{
font-size:90px;
color:white;
text-shadow:0 0 40px gold;
}

/* 得獎 */

#winner{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
display:none;
align-items:center;
justify-content:center;
flex-direction:column;
z-index:60;
}

.win-name{
font-size:100px;
color:white;
text-shadow:0 0 60px gold;
}

</style>

</head>

<body>

<div id="music-btn">🔊</div>
<div id="setting-btn">⚙ 系統設定</div>

<div id="stage" class="stage">

<div id="ready-btn"></div>

<div id="draw-btn"></div>

<div id="rolling">

<div style="color:#fccd4d;font-size:40px;margin-bottom:40px">
抽獎進行中
</div>

<div id="roll-name" class="roll-name"></div>

</div>

<div id="winner">

<div style="color:#fccd4d;font-size:40px;margin-bottom:30px">
天選之人
</div>

<div id="winner-name" class="win-name"></div>

</div>

</div>

<audio id="bgm">
<source src="music.mp3.m4a">
</audio>

<script>

const audio = document.getElementById("bgm")
const musicBtn = document.getElementById("music-btn")

let musicOn = true

/* 音樂循環 */

audio.addEventListener("ended",function(){
audio.currentTime = 0
audio.play()
})

/* 音樂開關 */

musicBtn.onclick = () => {

if(musicOn){
audio.pause()
musicBtn.innerHTML="🔇"
}else{
audio.play()
musicBtn.innerHTML="🔊"
}

musicOn=!musicOn

}

/* 系統設定 (iPad好按版) */

document.getElementById("setting-btn").onclick = () => {

let input=prompt("輸入抽獎名單，用逗號分隔")

if(!input) return

names=input.split(",")

alert("名單已更新，共 "+names.length+" 人")

}

/* READY */

document.getElementById("ready-btn").onclick = () => {

document.getElementById("stage").classList.add("ready-mode")

document.getElementById("draw-btn").style.display="block"

audio.currentTime=0
audio.play()

}

/* 抽獎 */

let names=[]
let rolling=false
let timer

document.getElementById("draw-btn").onclick=()=>{

if(rolling) return

if(names.length==0){

let input=prompt("輸入抽獎名單，用逗號分隔")

if(!input) return

names=input.split(",")

}

rolling=true

document.getElementById("rolling").style.display="flex"

timer=setInterval(()=>{

let name=names[Math.floor(Math.random()*names.length)]

document.getElementById("roll-name").innerText=name

},60)

setTimeout(()=>{

clearInterval(timer)

rolling=false

showWinner()

},6000)

}

/* 中獎 */

function showWinner(){

document.getElementById("rolling").style.display="none"

let index=Math.floor(Math.random()*names.length)

let win=names.splice(index,1)

document.getElementById("winner-name").innerText=win

document.getElementById("winner").style.display="flex"

confetti({
particleCount:250,
spread:120,
origin:{y:0.6}
})

}

</script>

</body>

</html>

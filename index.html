<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>亞護開發 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: sans-serif; }
        
        /* 背景：直接使用您最完整的第一張圖 (IMG_0022.jpg) */
        .stage {
            position: relative; width: 100vw; height: 100vh;
            background: url('ready.jpg.PNG') center/contain no-repeat; /* 這裡請確認檔名是否為 ready.jpg.PNG */
        }

        /* 紅框動態區：疊加在背景紅框之上 */
        .lotto-container {
            position: absolute; top: 62%; left: 50%; transform: translate(-50%, -50%);
            width: 50%; height: 25%; display: flex; align-items: center; justify-content: center; z-index: 10;
        }
        #display-text {
            color: #FFFFFF; font-size: 80px; font-weight: 900; text-align: center;
            text-shadow: 0 0 20px rgba(252, 205, 77, 0.8), 2px 2px 5px #000;
            line-height: 1.2;
        }

        /* 透明按鈕：對準背景圖的「開始抽獎」按鈕位置 */
        #btn-start {
            position: absolute; top: 76%; left: 50%; transform: translate(-50%, -50%);
            width: 250px; height: 70px; cursor: pointer; z-index: 20;
            /* background: rgba(255,0,0,0.3); */ /* 測試時可取消註解看位置是否準確 */
        }

        /* 透明設定入口：對準背景圖最下方的「系統設定」圖示 */
        #btn-admin-gate {
            position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);
            width: 120px; height: 40px; cursor: pointer; z-index: 20;
            /* border: 1px solid lime; */ /* 測試用 */
        }

        /* 系統設定面板：採用您提供的 IMG_0036 深色風格 */
        #admin-panel {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(42, 16, 16, 0.98); z-index: 999; display: none; color: #fff; padding: 30px; box-sizing: border-box;
        }
        .form-item { margin-bottom: 20px; }
        textarea, input { width: 100%; padding: 12px; background: #4D2626; border: 1px solid #633; color: #fff; border-radius: 8px; font-size: 18px; box-sizing: border-box; }
        .save-btn { width: 100%; background: #FCCD4D; color: #311; padding: 15px; border: none; font-weight: bold; font-size: 20px; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="stage">
        <div class="lotto-container">
            <div id="display-text">READY</div>
        </div>

        <div id="btn-start" onclick="startLotto()"></div>
        <div id="btn-admin-gate" onclick="openAdmin()"></div>
    </div>

    <div id="admin-panel">
        <h2 style="color: #FCCD4D;">⚙️ 抽獎控制面板</h2>
        <div class="form-item">
            <label>抽獎名單 (一人一行)</label>
            <textarea id="name-list" rows="12" placeholder="請貼入名單..."></textarea>
        </div>
        <div class="form-item">
            <label>單次抽出人數</label>
            <input type="number" id="per-draw" value="1">
        </div>
        <button class="save-btn" onclick="saveSettings()">儲存設定並返回</button>
        <button class="save-btn" style="background:transparent; color:#fff; margin-top:10px;" onclick="closeAdmin()">取消</button>
    </div>

    <audio id="bg-m" src="music.mp3.m4a"></audio>

    <script>
        let isRolling = false;
        let rollTimer;
        let config = { names: [], per: 1 };
        const audio = document.getElementById('bg-m');

        function openAdmin() { document.getElementById('admin-panel').style.display = 'block'; }
        function closeAdmin() { document.getElementById('admin-panel').style.display = 'none'; }

        function saveSettings() {
            config.names = document.getElementById('name-list').value.split('\n').filter(n => n.trim() !== "");
            config.per = parseInt(document.getElementById('per-draw').value);
            closeAdmin();
        }

        function startLotto() {
            if (config.names.length === 0) { alert("請先點擊下方『系統設定』輸入名單"); return; }
            if (isRolling) return;

            isRolling = true;
            audio.play();

            // 7 秒拉霸滾輪效果
            rollTimer = setInterval(() => {
                document.getElementById('display-text').innerText = config.names[Math.floor(Math.random() * config.names.length)];
                document.getElementById('display-text').style.fontSize = "80px";
            }, 50);

            setTimeout(() => {
                clearInterval(rollTimer);
                isRolling = false;
                
                // 抽出指定人數
                let winners = [];
                for(let i=0; i < config.per; i++) {
                    if(config.names.length > 0) {
                        let idx = Math.floor(Math.random() * config.names.length);
                        winners.push(config.names.splice(idx, 1)[0]);
                    }
                }

                // 顯示中獎名單，如果人數多則縮小字體
                const display = document.getElementById('display-text');
                display.innerHTML = winners.join('<br>');
                display.style.fontSize = winners.length > 10 ? "24px" : (winners.length > 5 ? "36px" : "60px");
                
                confetti({ particleCount: 200, spread: 90, origin: { y: 0.6 } });
            }, 7000); // 準確 7 秒
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>2026 春酒抽獎</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>

body{
margin:0;
overflow:hidden;
font-family:sans-serif;
}

.stage{
position:fixed;
width:100%;
height:100%;
background:url("yahu.jpg") center/cover no-repeat;
}

.stage.ready{
background:url("ready.jpg") center/cover no-repeat;
}

.start{
position:absolute;
top:60%;
left:50%;
transform:translate(-50%,-50%);
width:300px;
height:100px;
cursor:pointer;
}

.readyPanel{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
color:white;
display:none;
}

.readyPanel h1{
font-size:90px;
}

button{
font-size:30px;
padding:20px 50px;
border:none;
border-radius:10px;
background:gold;
cursor:pointer;
}

.rolling{
position:fixed;
width:100%;
height:100%;
background:black;
color:white;
display:none;
align-items:center;
justify-content:center;
flex-direction:column;
}

.rollingName{
font-size:120px;
}

.winner{
position:fixed;
width:100%;
height:100%;
background:black;
color:white;
display:none;
align-items:center;
justify-content:center;
flex-direction:column;
}

.winnerName{
font-size:150px;
color:gold;
}

.admin{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
color:white;
display:none;
padding:40px;
}

textarea{
width:100%;
height:200px;
}

</style>
</head>

<body>

<div class="stage" id="stage">

<div class="start" onclick="startGame()"></div>

<div class="readyPanel" id="readyPanel">

<h1>READY</h1>
<p>準備開獎</p>

<button onclick="startLottery()">開始抽獎</button>

</div>

</div>

<div class="rolling" id="rolling">

<h2>抽獎中</h2>

<div id="rollingName" class="rollingName"></div>

</div>

<div class="winner" id="winner" onclick="closeWinner()">

<h2>🎉 天選之人 🎉</h2>

<div id="winnerName" class="winnerName"></div>

</div>

<div class="admin" id="admin">

<h2>設定名單</h2>

<textarea id="names"></textarea>

<br><br>

<button onclick="saveNames()">儲存</button>

</div>

<audio id="bgm" src="music.m4a" loop></audio>

<script>

let names=[]
let drawn=[]

function startGame(){

stage.classList.add("ready")

readyPanel.style.display="block"

bgm.play()

}

function saveNames(){

names=document.getElementById("names").value.split("\n")

admin.style.display="none"

}

function startLottery(){

rolling.style.display="flex"

let speed=50

function roll(){

rollingName.innerText=names[Math.floor(Math.random()*names.length)]

speed+=20

if(speed<400){

setTimeout(roll,speed)

}else{

showWinner()

}

}

roll()

}

function showWinner(){

rolling.style.display="none"

let index=Math.floor(Math.random()*names.length)

let name=names.splice(index,1)

winnerName.innerText=name

winner.style.display="flex"

confetti({
particleCount:300,
spread:120
})

}

function closeWinner(){

winner.style.display="none"

}

</script>

</body>
</html>

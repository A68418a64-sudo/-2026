<!DOCTYPE html>
<html lang="zh-TW">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>亞護開發 2026 春酒抽獎</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>

body{
margin:0;
font-family:sans-serif;
overflow:hidden;
background:black;
}

/* 主舞台 /

.stage{
position:relative;
width:100vw;
height:100vh;
background:url("yahu.jpg") center/cover no-repeat;
}

/ READY背景 /

.stage.ready{
background:url("ready.jpg") center/cover no-repeat;
}

/ 左上統計 /

.hud{
position:absolute;
top:30px;
left:40px;
color:#f2d089;
font-size:22px;
line-height:36px;
display:none;
}

/ 右上 /

.topbar{
position:absolute;
top:20px;
right:30px;
display:flex;
gap:20px;
font-size:26px;
color:white;
}

.topbar div{
cursor:pointer;
}

/ 遊戲開始按鈕 /

.start-btn{
position:absolute;
top:60%;
left:50%;
transform:translate(-50%,-50%);
width:320px;
height:100px;
cursor:pointer;
}

/ READY 畫面 /

.ready-panel{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
color:white;
display:none;
}

.ready-title{
font-size:80px;
}

.ready-sub{
font-size:36px;
}

.draw-btn{
margin-top:40px;
font-size:28px;
padding:15px 40px;
background:#f2b63d;
border:none;
cursor:pointer;
}

/ 抽獎動畫 /

.rolling{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
display:none;
align-items:center;
justify-content:center;
flex-direction:column;
color:white;
}

.rolling-name{
font-size:120px;
}

/ 得獎畫面 /

.winner{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
display:none;
align-items:center;
justify-content:center;
flex-direction:column;
color:white;
}

.winner-title{
font-size:40px;
margin-bottom:40px;
}

.winner-list{
display:grid;
gap:20px;
text-align:center;
}

/ 系統設定 */

.admin{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.95);
display:none;
padding:40px;
color:white;
overflow:auto;
}

textarea,input,select{
width:100%;
padding:10px;
margin:10px 0;
background:#222;
color:white;
border:1px solid #444;
}

button{
padding:10px 20px;
background:gold;
border:none;
cursor:pointer;
}

</style>

</head>

<body>

<div class="stage" id="stage">

<div class="hud" id="hud">

<div>👥 參與人數：<span id="total">0</span></div>
<div>🎯 已抽人數：<span id="drawn">0</span></div>
<div>📉 剩餘人數：<span id="remain">0</span></div>

</div>

<div class="topbar">

<div onclick="toggleMusic()" id="musicBtn">🔊</div>
<div onclick="openAdmin()">⚙</div>

</div>

<div class="start-btn" onclick="startGame()"></div>

<div class="ready-panel" id="readyPanel">

<div class="ready-title">READY</div>
<div class="ready-sub">準備開獎</div>

<button class="draw-btn" onclick="startLottery()">開始抽獎</button>

</div>

<div class="rolling" id="rolling">

<div>抽獎進行中</div>

<div id="rollingName" class="rolling-name"></div>

</div>

<div class="winner" id="winner" onclick="closeWinner()">

<div class="winner-title">🎉 天選之人 🎉</div>

<div id="winnerList" class="winner-list"></div>

</div>

</div>

<div class="admin" id="admin">

<h2>系統設定</h2>

<p>參與名單 (一行一人)</p>

<textarea id="names" rows="10"></textarea>

<p>一次抽幾人</p>

<input id="perDraw" type="number" value="1">

<p>得獎字體大小</p>

<input id="fontSize" type="number" value="80">

<p>名單排列方式</p>

<select id="layout">

<option value="1">一欄</option>
<option value="2">兩欄</option>

</select>

<button onclick="saveAdmin()">儲存</button>

</div>

<audio id="bgm" src="music.m4a" loop></audio>

<script>

let names=[]
let drawn=0
let total=0
let perDraw=1
let fontSize=80
let layout=1

function startGame(){

document.querySelector(".start-btn").style.display="none"

document.getElementById("readyPanel").style.display="block"

document.getElementById("stage").classList.add("ready")

document.getElementById("hud").style.display="block"

}

function startLottery(){

document.getElementById("rolling").style.display="flex"

let timer=setInterval(()=>{

let name=names[Math.floor(Math.random()*names.length)]

document.getElementById("rollingName").innerText=name

},80)

setTimeout(()=>{

clearInterval(timer)

showWinner()

},4000)

}

function showWinner(){

document.getElementById("rolling").style.display="none"

let winners=[]

for(let i=0;i<perDraw;i++){

let index=Math.floor(Math.random()*names.length)

winners.push(names.splice(index,1)[0])

drawn++

}

updateHud()

let list=document.getElementById("winnerList")

list.innerHTML=""

list.style.fontSize=fontSize+"px"

list.style.gridTemplateColumns="repeat("+layout+",1fr)"

winners.forEach(n=>{

let div=document.createElement("div")

div.innerText=n

list.appendChild(div)

})

document.getElementById("winner").style.display="flex"

confetti({particleCount:200,spread:100})

}

function closeWinner(){

document.getElementById("winner").style.display="none"

}

function openAdmin(){

document.getElementById("admin").style.display="block"

}

function saveAdmin(){

names=document.getElementById("names").value.split("\n").filter(n=>n!="")

perDraw=parseInt(document.getElementById("perDraw").value)

fontSize=parseInt(document.getElementById("fontSize").value)

layout=parseInt(document.getElementById("layout").value)

total=names.length

drawn=0

updateHud()

document.getElementById("admin").style.display="none"

}

function updateHud(){

document.getElementById("total").innerText=total
document.getElementById("drawn").innerText=drawn
document.getElementById("remain").innerText=total-drawn

}

</script>

</body>
</ht

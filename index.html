<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>亞護開發 2026 抽獎系統</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
        
        /* Layer 1: 主背景圖 (紅框空白版) */
        .main-bg {
            position: relative; width: 100vw; height: 100vh;
            background: url('bg-main.jpg.JPG') center/contain no-repeat;
        }

        /* 內容顯示容器 (對準 READY 框座標) */
        .content-overlay {
            position: absolute; 
            top: 48%; left: 50%; transform: translate(-50%, -50%);
            width: 45%; height: 25%;
            display: flex; align-items: center; justify-content: center; z-index: 10;
        }

        /* Layer 2: READY 框 (可隱藏) */
        #ready-layer {
            text-align: center; color: #C0C0C0; cursor: default;
        }
        .ready-main { font-size: 90px; font-weight: 900; letter-spacing: 8px; line-height: 1; }
        .ready-sub { font-size: 36px; margin-top: 10px; font-weight: bold; }

        /* Layer 3 & 4: 抽獎動畫與結果 */
        #lotto-layer {
            display: none; color: #FFFFFF; font-weight: 900; text-align: center;
            text-shadow: 0 0 20px rgba(252, 205, 77, 0.8); line-height: 1.1;
        }

        /* 功能按鈕感應區 (根據 Hotspot 規格設定) */
        #btn-start { position: absolute; top: 76.5%; left: 50%; transform: translate(-50%, -50%); width: 240px; height: 70px; cursor: pointer; z-index: 20; }
        #btn-setting { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); width: 150px; height: 40px; cursor: pointer; z-index: 20; }

        /* Layer 5: 系統設定面板 (IMG_0036 風格) */
        #admin-panel {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(42, 16, 16, 0.98); z-index: 999; display: none; color: #fff; padding: 30px; box-sizing: border-box;
        }
        .form-group { margin-bottom: 15px; }
        textarea, input { width: 100%; padding: 12px; background: #4D2626; border: 1px solid #633; color: #fff; border-radius: 8px; font-size: 18px; }
        .save-btn { width: 100%; background: #FCCD4D; color: #311; padding: 15px; border: none; font-weight: bold; font-size: 20px; border-radius: 10px; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="main-bg">
        <div class="content-overlay">
            <div id="ready-layer">
                <div class="ready-main">READY</div>
                <div class="ready-sub">準備開獎</div>
            </div>
            <div id="lotto-layer"></div>
        </div>

        <div id="btn-start" onclick="executeDraw()"></div>
        <div id="btn-setting" onclick="togglePanel()"></div>
    </div>

    <div id="admin-panel">
        <h2 style="color: #FCCD4D;">⚙️ 抽獎控制面板</h2>
        <div class="form-group">
            <label>抽獎名單 (一人一行)</label>
            <textarea id="list-input" rows="10"></textarea>
        </div>
        <div class="form-group">
            <label>單次抽出人數</label>
            <input type="number" id="count-input" value="1">
        </div>
        <div class="form-group">
            <label>名單字體大小 (例如: 60px)</label>
            <input type="text" id="size-input" value="60px">
        </div>
        <button class="save-btn" onclick="applySettings()">儲存並返回</button>
        <button class="save-btn" style="background:transparent; color:#fff; border:1px solid #fff;" onclick="togglePanel()">取消</button>
    </div>

    <audio id="bgm" src="music.mp3.m4a"></audio>

    <script>
        let rolling = false;
        let settings = { names: [], per: 1, size: "60px" };
        const bgm = document.getElementById('bgm');

        function togglePanel() {
            const panel = document.getElementById('admin-panel');
            panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
        }

        function applySettings() {
            settings.names = document.getElementById('list-input').value.split('\n').filter(n => n.trim() !== "");
            settings.per = parseInt(document.getElementById('count-input').value);
            settings.size = document.getElementById('size-input').value;
            document.getElementById('lotto-layer').style.fontSize = settings.size;
            togglePanel();
        }

        function executeDraw() {
            if (settings.names.length === 0) { alert("請先進入系統設定輸入名單"); return; }
            if (rolling) return;

            rolling = true;
            bgm.play();

            // 1. 隱藏 READY 框 (Layer 2)
            document.getElementById('ready-layer').style.display = 'none';
            // 2. 顯示並啟動抽獎動畫 (Layer 3)
            const lottoView = document.getElementById('lotto-layer');
            lottoView.style.display = 'block';

            const timer = setInterval(() => {
                lottoView.innerText = settings.names[Math.floor(Math.random() * settings.names.length)];
            }, 50);

            // 3. 7 秒後停止並顯示結果 (Layer 4)
            setTimeout(() => {
                clearInterval(timer);
                rolling = false;
                
                let winners = [];
                for(let i=0; i < settings.per; i++) {
                    if(settings.names.length > 0) {
                        let idx = Math.floor(Math.random() * settings.names.length);
                        winners.push(settings.names.splice(idx, 1)[0]);
                    }
                }

                lottoView.innerHTML = winners.join('<br>');
                confetti({ particleCount: 200, spread: 90, origin: { y: 0.6 } });
            }, 7000); // 嚴格 7 秒
        }
    </script>
</body>
</html>

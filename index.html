<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>亞護開發 2026 春酒抽獎</title>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background: black;
            font-family: "Microsoft JhengHei", sans-serif;
        }

        .main-stage {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: url('ready.jpg.PNG') center/cover no-repeat;
            transition: 0.5s;
        }

        /* 關鍵修正：將人數定位在背景圖原本的位置 */
        #dynamic-stats {
            position: absolute;
            top: 49.5%; /* 根據截圖調整高度 */
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            justify-content: center;
            gap: 40px; /* 調整剩餘與已抽之間的距離 */
            z-index: 5;
            pointer-events: none;
            width: 100%;
        }

        .stat-item {
            color: #fccd4d; /* 金色文字對應背景 */
            font-size: 20px;
            font-weight: bold;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
        }

        /* 原本的統計方框刪除，改用上面的定位 */
        #settings-btn {
            position: absolute;
            top: 15px; left: 15px;
            width: 40px; height: 40px;
            background: rgba(0, 0, 0, 0.2);
            color: rgba(255,255,255,0.5);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            z-index: 60;
            font-size: 20px;
        }

        #draw-trigger {
            position: absolute;
            width: 28%; height: 8%;
            top: 86%; left: 50%;
            transform: translate(-50%, -50%);
            cursor: pointer;
            z-index: 10;
        }

        #rolling-ui, #winner-ui {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #rolling-ui { background: rgba(0, 0, 0, 0.85); z-index: 20; }
        #winner-ui { background: rgba(0, 0, 0, 0.9); z-index: 25; cursor: pointer; }

        .rolling-name { font-size: 90px; color: white; font-weight: bold; text-shadow: 0 0 40px #fccd4d; }
        .winner-name { font-size: 100px; color: white; font-weight: bold; text-shadow: 0 0 50px #fccd4d; text-align: center; white-space: pre-wrap; }

        #admin-panel {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(10, 10, 10, 0.98);
            display: none;
            z-index: 100;
            padding: 40px 20px;
            box-sizing: border-box;
            color: white;
            overflow-y: auto;
        }

        .admin-content { max-width: 600px; margin: 0 auto; }
        .admin-input { width: 100%; background: #222; border: 1px solid #555; color: white; padding: 12px; margin: 10px 0 20px 0; font-size: 16px; border-radius: 8px; box-sizing: border-box; }
        .save-btn { background: #fccd4d; border: none; color: black; padding: 18px; font-weight: bold; border-radius: 8px; cursor: pointer; width: 100%; font-size: 18px; }
    </style>
</head>

<body>

    <div class="main-stage" id="stage">
        <div id="dynamic-stats">
            <div class="stat-item">剩餘 <span id="count-remain">0</span> 人</div>
            <div class="stat-item">已抽 <span id="count-pulled">0</span> 人</div>
        </div>

        <div id="settings-btn" onclick="showAdmin()"><i class="fas fa-cog"></i></div>

        <div id="draw-trigger" onclick="runLottery()"></div>

        <div id="rolling-ui">
            <div style="color:#fccd4d; font-size:32px; margin-bottom:40px; letter-spacing:8px;">抽獎進行中</div>
            <div id="rolling-name" class="rolling-name"></div>
        </div>

        <div id="winner-ui" onclick="reset()">
            <div style="color:#fccd4d; font-size:30px; margin-bottom:20px; letter-spacing:10px;">天選之人</div>
            <div id="winner-name" class="winner-name"></div>
            <div style="color:#aaa; margin-top:40px;">點擊畫面繼續</div>
        </div>
    </div>

    <div id="admin-panel">
        <div class="admin-content">
            <h2 style="color:#fccd4d; text-align: center;">系統設定</h2>
            <label>名單 (一人一行)</label>
            <textarea id="admin-names" class="admin-input" rows="10"></textarea>
            <label>單次抽幾人</label>
            <input type="number" id="admin-per" class="admin-input" value="1">
            <label>字體大小</label>
            <input type="text" id="admin-size" class="admin-input" value="80px">
            <button class="save-btn" onclick="hideAdmin()">儲存並更新</button>
        </div>
    </div>

    <audio id="bgm" src="music.mp3.m4a" loop></audio>

    <script>
        let rolling = false;
        let timer;
        let pulledCount = 0;
        let config = { names: [], perDraw: 1, fontSize: "80px" };

        function updateStatUI() {
            document.getElementById("count-remain").innerText = config.names.length;
            document.getElementById("count-pulled").innerText = pulledCount;
        }

        function showAdmin() { document.getElementById("admin-panel").style.display = "block"; }

        function hideAdmin() {
            config.names = document.getElementById("admin-names").value.split("\n").map(n => n.trim()).filter(n => n !== "");
            config.perDraw = parseInt(document.getElementById("admin-per").value) || 1;
            config.fontSize = document.getElementById("admin-size").value;
            pulledCount = 0; 
            updateStatUI();
            document.getElementById("admin-panel").style.display = "none";
        }

        function runLottery() {
            if (rolling || config.names.length === 0) return;
            rolling = true;
            document.getElementById("rolling-ui").style.display = "flex";
            timer = setInterval(() => {
                document.getElementById("rolling-name").innerText = config.names[Math.floor(Math.random() * config.names.length)];
            }, 60);
            setTimeout(() => {
                clearInterval(timer);
                rolling = false;
                showWinner();
            }, 7000);
        }

        function showWinner() {
            document.getElementById("rolling-ui").style.display = "none";
            let winners = [];
            for (let i = 0; i < config.perDraw; i++) {
                if (config.names.length > 0) {
                    winners.push(config.names.splice(Math.floor(Math.random() * config.names.length), 1)[0]);
                    pulledCount++;
                }
            }
            let winText = document.getElementById("winner-name");
            winText.innerText = winners.join("\n");
            winText.style.fontSize = config.fontSize;
            document.getElementById("winner-ui").style.display = "flex";
            updateStatUI();
            confetti({ particleCount: 200, spread: 70, origin: { y: 0.6 } });
        }

        function reset() { document.getElementById("winner-ui").style.display = "none"; }
        
        updateStatUI();
    </script>
</body>
</html>
